<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A TO Z Driver & Worker App</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box} html,body{min-height:100%;height:auto;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch} body{font-family:'DM Sans',sans-serif;background:#eef2f7;color:#0f172a}.glass{background:rgba(255,255,255,.88);backdrop-filter:blur(16px)}.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:900}.navbtn.active{background:#0f172a;color:#fff;box-shadow:0 12px 28px rgba(15,23,42,.22)}.card{background:white;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 16px 38px rgba(15,23,42,.08)}.field{width:100%;border:1px solid #cbd5e1;border-radius:14px;padding:12px 13px;font-size:14px;outline:none;background:#fff}.field:focus{border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.13)}.btn{border-radius:15px;padding:12px 14px;font-weight:900;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:7px}.toast{animation:slideIn .25s ease}@keyframes slideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}.safe-area{padding-bottom:180px}.bottom-nav{display:none}@media(max-width:780px){.safe-area{padding-bottom:220px!important}.desktop-nav{display:none}.bottom-nav{display:grid;grid-template-columns:repeat(5,1fr);position:fixed;left:0;right:0;bottom:0;z-index:50;background:#fff;border-top:1px solid #e2e8f0;padding:7px;gap:5px}.bottom-nav button{font-size:10px;border-radius:13px;padding:8px 3px;font-weight:900}.grid-auto{grid-template-columns:1fr!important}.card{border-radius:20px}.top-title{font-size:22px!important}.hide-mobile{display:none!important}} 
    .azp-proof-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px}
    .azp-proof-item{border-radius:16px;padding:10px 12px;font-weight:900;display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid #e2e8f0}
    .azp-proof-pending{background:linear-gradient(90deg,#fff7ed,#fee2e2);color:#991b1b;animation:azpBlinkPending 1s ease-in-out infinite}
    .azp-proof-approved{background:linear-gradient(90deg,#dcfce7,#ccfbf1);color:#065f46}
    .azp-proof-waiting{background:linear-gradient(90deg,#eff6ff,#eef2ff);color:#1d4ed8}
    @keyframes azpBlinkPending{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.62;transform:scale(.99)}}
    .azp-marquee{overflow:hidden;white-space:nowrap;border-radius:16px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-weight:900;padding:10px 0;margin-top:12px}
    .azp-marquee span{display:inline-block;padding-left:100%;animation:azpMarquee 22s linear infinite}
    @keyframes azpMarquee{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
    .azp-impact{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:12px;margin-top:12px;font-size:13px;font-weight:900;color:#334155}
    @media print{.no-print{display:none!important}body{background:#fff}.card{box-shadow:none}}
  </style>
</head>
<body class="min-h-screen">
  <div class="bg-gradient-to-br from-slate-900 via-blue-900 to-emerald-900 text-white px-4 py-5 sticky top-0 z-40 no-print">
    <div class="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-3">
      <div>
        <h1 class="top-title text-2xl md:text-3xl font-black tracking-tight">A TO Z Driver & Worker Branch</h1>
        <p class="text-white/75 text-sm mt-1">Connected with Execution Software • Firebase Permanent Storage</p>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <span id="firebaseStatus" class="chip bg-amber-100 text-amber-900">Connecting...</span>
        <button onclick="logout()" class="btn bg-white/10 hover:bg-white/20 text-white">Logout</button>
      </div>
    </div>
  </div>

  <main class="max-w-6xl mx-auto px-4 py-5 safe-area">
    <section id="loginPanel" class="card p-5 md:p-7 max-w-xl mx-auto mt-6">
      <div class="text-center mb-5">
        <div class="w-16 h-16 rounded-3xl bg-slate-900 text-white grid place-items-center mx-auto text-3xl">👷</div>
        <h2 class="text-2xl font-black mt-3">Staff Login</h2>
        <p class="text-slate-500 text-sm mt-1">Select role and name. Staff will see only their own related work.</p>
      </div>
      <div class="grid grid-cols-1 gap-3">
        <label><span class="font-bold text-sm">Role</span><select id="loginRole" class="field mt-1"><option>Driver</option><option>Worker</option><option>Admin Preview</option></select></label>
        <label><span class="font-bold text-sm">Name</span><select id="loginName" class="field mt-1"></select></label>
        <label><span class="font-bold text-sm">Mobile / PIN optional</span><input id="loginMobile" class="field mt-1" placeholder="Optional mobile or PIN"></label>
        <button onclick="login()" class="btn bg-blue-700 hover:bg-blue-800 text-white w-full mt-2">Open My Dashboard</button>
      </div>
    </section>

    <section id="appPanel" class="hidden">
      <div class="card p-4 md:p-5 mb-4">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <p class="text-xs font-black text-blue-700 uppercase tracking-wide">Logged In</p>
            <h2 id="staffTitle" class="text-xl md:text-2xl font-black">Staff</h2>
            <p id="accessNote" class="text-sm text-slate-500 mt-1"></p>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-center">
            <div class="rounded-2xl bg-blue-50 p-3"><p class="text-xs text-blue-700 font-black">Jobs</p><p id="statJobs" class="text-xl font-black">0</p></div>
            <div class="rounded-2xl bg-emerald-50 p-3"><p class="text-xs text-emerald-700 font-black">Present</p><p id="statPresent" class="text-xl font-black">0</p></div>
            <div class="rounded-2xl bg-orange-50 p-3"><p class="text-xs text-orange-700 font-black">Pending ₹</p><p id="statPending" class="text-xl font-black">0</p></div>
            <div class="rounded-2xl bg-purple-50 p-3"><p class="text-xs text-purple-700 font-black">Score</p><p id="statScore" class="text-xl font-black">100%</p></div>
          </div>
        </div>
      </div>

      <nav id="desktopNav" class="desktop-nav grid grid-cols-3 md:grid-cols-6 lg:grid-cols-9 gap-2 mb-4 no-print"></nav>
      <div id="content"></div>
    </section>
  </main>

  <div id="bottomNav" class="bottom-nav no-print"></div>
  <div id="toast" class="fixed top-4 right-4 z-[80] hidden"><div class="toast rounded-xl bg-emerald-600 text-white px-4 py-3 text-sm font-black shadow-xl"></div></div>

  <script type="module">
    import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDocs, serverTimestamp, query } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

    const firebaseConfig={apiKey:'AIzaSyC4I13JSUkhun5DgpgLlnyiimTzdPobT14',authDomain:'az-packers-quotation.firebaseapp.com',projectId:'az-packers-quotation',storageBucket:'az-packers-quotation.firebasestorage.app',messagingSenderId:'682004383688',appId:'1:682004383688:web:b795a19579dba9a612a2fd'};
    const app=getApps().length?getApp():initializeApp(firebaseConfig); const db=getFirestore(app);
    const MAIN='azpExecutionRecords'; const STAFF_UPDATES='azpStaffUpdates';
    const defaultDrivers=['Mahesh','Santosh','Somnath','Sanjay','Ajay'];
    const defaultWorkers=['Deepak','Hemant','Babul','Binod','Sillu','Surendra','Trilochan','Sukadeb','New Boy'];
    const companyRules=[
      'Pre-night customer call is mandatory before dispatch.',
      'Vehicle must reach pickup location on time and update status from mobile.',
      'Packing, loading, unloading video, item list, bill copy and payment screenshot must be sent in the official WhatsApp group. Office will mark Received / Not Received in Execution Software.',
      'Payment screenshot must be collected before unloading as per office instruction.',
      'Uniform is compulsory for professional work and customer trust.',
      'No argument with customer. Any issue must be reported to office immediately.',
      'Extra worker, extra item, extra floor or route change must be updated before work.',
      'Driver must check vehicle documents, fuel, tyre, meter and repair issue before start.'
    ];
    let all=[],currentUser=null,currentTab='dashboard',unsub=null;
    const today=()=>new Date().toISOString().slice(0,10); const money=n=>'₹'+Number(n||0).toLocaleString('en-IN');
    const sid=s=>String(s||('SW_'+Date.now()+'_'+Math.random().toString(36).slice(2))).replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,120);
    const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
    const lower=s=>String(s||'').trim().toLowerCase();
    const compact=s=>lower(s).replace(/\s+/g,'');
    const sameName=(a,b)=>compact(a) && compact(a)===compact(b);
    const hasName=(value,name)=>{
      const v=compact(value), n=compact(name);
      if(!v||!n) return false;
      if(v===n) return true;
      return String(value||'').toLowerCase().split(/[,/|;\n]+/).some(part=>compact(part)===n) || v.includes(n);
    };
    const byModule=m=>all.filter(r=>r.module===m||r.collection===m);
    const isJobRecord=r=>['jobs','planningSheets','planningSheet','planning-sheet','planning_sheet'].some(m=>r.module===m||r.collection===m) || String(r.job_id||r.planning_no||'').toUpperCase().startsWith('PLN');
    const isMine=r=>{
      if(!currentUser) return false;
      if(currentUser.role==='Admin Preview') return true;
      const n=currentUser.name;
      const mobile=String(currentUser.mobile||'').replace(/\D/g,'');
      const role=currentUser.role;
      const mobileMatch=mobile && [r.mobile,r.driver_mobile,r.driver_contact,r.assigned_driver_mobile,r.team_leader_contact,r.worker_mobile,r.employee_mobile,r.contact,r.party_mobile].some(x=>String(x||'').replace(/\D/g,'')===mobile);
      if(mobileMatch) return true;
      if(role==='Driver'){
        return [
          r.driver, r.driver_name, r.assigned_driver, r.assigned_driver_name, r.driverName,
          r.team_leader, r.team_leader_name, r.plan_team_leader, r.vehicle_driver, r.employee_name,
          r.done_by_driver, r.staff_name
        ].some(x=>hasName(x,n));
      }
      return [
        r.worker_name, r.workers, r.assigned_workers, r.assigned_worker_names, r.workerNames,
        r.team, r.team_members, r.team_leader, r.team_leader_name, r.received_by, r.employee_name,
        r.staff_name
      ].some(x=>hasName(x,n));
    };
    const myJobs=()=>all.filter(r=>isJobRecord(r)&&isMine(r)).sort((a,b)=>String(b.work_date||b.shifting_date||b.date||'').localeCompare(String(a.work_date||a.shifting_date||a.date||'')));
    const myRecords=m=>byModule(m).filter(isMine).sort((a,b)=>(b.updatedAtMs||0)-(a.updatedAtMs||0));
    const toast=(msg,err=false)=>{const t=document.getElementById('toast'),i=t.querySelector('div');i.textContent=msg;i.className='toast rounded-xl text-white px-4 py-3 text-sm font-black shadow-xl '+(err?'bg-red-600':'bg-emerald-600');t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2800)};
    const status=(txt,ok)=>{let e=document.getElementById('firebaseStatus');e.textContent=txt;e.className='chip '+(ok?'bg-emerald-100 text-emerald-900':'bg-red-100 text-red-900')};

    const tabs=[
      ['dashboard','Home','layout-dashboard'],['jobs','Planning Sheet','clipboard-list'],['attendance','Attendance','clock'],['fooding','Fooding','utensils'],['extra','Extra Work','plus-circle'],['uniform','Uniform','shirt'],['bill','Bill/Payment','receipt-indian-rupee'],['salary','Salary','banknote'],['bonus','Bonus','gift'],['level','Black/White Level','shield-alert'],['vehicle','Vehicle Docs','file-text'],['repairing','Repairing','wrench'],['rules','Rules','book-open']
    ];
    function allowedTabs(){ if(!currentUser)return []; if(currentUser.role==='Worker') return tabs.filter(t=>!['vehicle','repairing'].includes(t[0])); return tabs; }
    function namesForRole(role){ const masters=role==='Driver'?byModule('driverMaster').map(r=>r.driver_name):byModule('workerMaster').map(r=>r.worker_name); return [...new Set([...(role==='Driver'?defaultDrivers:defaultWorkers),...masters].filter(Boolean))]; }
    window.refreshNames=()=>{let role=document.getElementById('loginRole').value; let names=role==='Admin Preview'?['Manoj Kumar Swain','Office Admin']:namesForRole(role); document.getElementById('loginName').innerHTML=names.map(n=>`<option>${esc(n)}</option>`).join('');};
    document.getElementById('loginRole').addEventListener('change',window.refreshNames);
    window.login=()=>{currentUser={role:document.getElementById('loginRole').value,name:document.getElementById('loginName').value,mobile:document.getElementById('loginMobile').value};localStorage.setItem('azp_staff_login',JSON.stringify(currentUser));document.getElementById('loginPanel').classList.add('hidden');document.getElementById('appPanel').classList.remove('hidden');currentTab='dashboard';buildNav();render();};
    window.logout=()=>{localStorage.removeItem('azp_staff_login');location.reload();};
    window.switchTab=t=>{currentTab=t;buildNav();render();};
    function buildNav(){ const nav=document.getElementById('desktopNav'),bot=document.getElementById('bottomNav'); let list=allowedTabs(); nav.innerHTML=list.map(([k,l,ic])=>`<button onclick="switchTab('${k}')" class="navbtn ${currentTab===k?'active':'bg-white text-slate-700'} border border-slate-200 rounded-2xl px-3 py-3 font-black text-xs flex flex-col items-center gap-1"><i data-lucide="${ic}" style="width:17px;height:17px"></i>${l}</button>`).join(''); bot.innerHTML=list.slice(0,5).map(([k,l])=>`<button onclick="switchTab('${k}')" class="${currentTab===k?'bg-slate-900 text-white':'bg-slate-100 text-slate-700'}">${l.split('/')[0]}</button>`).join(''); setTimeout(()=>lucide.createIcons(),20); }
    function render(){ if(!currentUser)return; document.getElementById('staffTitle').textContent=`${currentUser.name} — ${currentUser.role}`; document.getElementById('accessNote').textContent=currentUser.role==='Admin Preview'?'Admin preview can see all staff branch records.':'This device shows only assigned/related records for this staff.'; const jobs=myJobs(), att=myRecords('attendance').filter(r=>r.date===today()&&r.attendance_status==='Present'), pays=myRecords('payroll'), bl=myRecords('list')[0]; let pending=jobs.reduce((a,r)=>a+Math.max((+r.total_amount||0)-(+r.advance_received||0)-(+r.loading_payment||0)-(+r.unloading_payment||0),0),0); document.getElementById('statJobs').textContent=jobs.length; document.getElementById('statPresent').textContent=att.length; document.getElementById('statPending').textContent=money(pending); {
      const st=String(bl?.status||bl?.black_white_status||bl?.blacklist_status||'').toLowerCase();
      const pct=bl?.percentage_level || bl?.score || (st.includes('black')?'0':(st.includes('white')?'100':'80'));
      document.getElementById('statScore').textContent=pct+'%';
    } ({dashboard, jobs:renderJobs, attendance, fooding, extra, uniform, bill, salary, bonus, level, vehicle, repairing, rules}[currentTab]||dashboard)(); }
    const empty=txt=>`<div class="card p-6 text-center text-slate-500 font-bold">${txt}</div>`;
    const jobCard=j=>`<div class="card p-4"><div class="flex flex-wrap justify-between gap-2"><div><p class="text-xs font-black text-blue-700">${esc(j.job_id||j.id||'JOB')}</p><h3 class="font-black text-lg">${esc(j.customer_name||'Customer')}</h3><p class="text-sm text-slate-500">${esc(j.from_location||'')} → ${esc(j.to_location||'')}</p></div><span class="chip ${j.status==='Completed'?'bg-emerald-100 text-emerald-800':'bg-amber-100 text-amber-900'}">${esc(j.status||'Assigned')}</span></div><div class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-3 text-sm"><div class="bg-slate-50 rounded-2xl p-3"><b>Date</b><br>${esc(j.work_date||j.shifting_date||j.date||'-')}</div><div class="bg-slate-50 rounded-2xl p-3"><b>Vehicle</b><br>${esc(j.vehicle_number||'-')}</div><div class="bg-slate-50 rounded-2xl p-3"><b>Driver</b><br>${esc(j.driver||j.driver_name||j.assigned_driver||j.team_leader||j.team_leader_name||'-')}</div><div class="bg-slate-50 rounded-2xl p-3"><b>Amount</b><br>${money(j.total_amount)}</div></div><div class="mt-3"><p class="text-xs font-black text-slate-500 uppercase">WhatsApp Proof Approval</p>${proofChecklist(j)}</div><div class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-3 no-print"><button class="btn bg-blue-600 text-white" onclick="updateJob('${j.id}','Reached Pickup')">Reached</button><button class="btn bg-orange-600 text-white" onclick="updateJob('${j.id}','Loading')">Loading</button><button class="btn bg-purple-600 text-white" onclick="updateJob('${j.id}','In Transit')">Transit</button><button class="btn bg-emerald-600 text-white" onclick="updateJob('${j.id}','Completed')">Complete</button></div></div>`;
    const proofItems=[
      ['packing_video','📹 Packing Video'],['item_list','📋 Item List'],['loading_video','🚚 Loading Video'],['payment_screenshot','💰 Payment Screenshot'],['unloading_video','📦 Unloading Video'],['bill_copy','🧾 Bill Copy']
    ];
    const proofKeys=(k)=>[k,k+'_status',k+'_received',k+'_approved',k.replace(/_/g,'')+'_status'];
    function proofValue(job,k){
      const values=proofKeys(k).map(x=>job[x]).filter(v=>v!==undefined&&v!==null&&String(v).trim()!=='');
      const related=all.filter(r=>['proof','proofStatus','jobUploads','uploads'].includes(r.module)||['proof','proofStatus','jobUploads','uploads'].includes(r.collection)).filter(r=>String(r.job_id||r.planning_no||'')===String(job.job_id||job.planning_no||job.id||''));
      related.forEach(r=>proofKeys(k).forEach(x=>{if(r[x]!==undefined&&r[x]!==null) values.push(r[x]);}));
      const v=String(values[values.length-1]||'').toLowerCase();
      if(['approved','received','yes','done','ok','true'].some(x=>v.includes(x))) return 'Approved';
      if(['reject','not received','no','false'].some(x=>v.includes(x))) return 'Pending';
      return 'Pending';
    }
    function proofChecklist(job={}){return `<div class="azp-proof-grid">${proofItems.map(([k,l])=>{const st=proofValue(job,k); const ok=st==='Approved'; return `<div class="azp-proof-item ${ok?'azp-proof-approved':'azp-proof-pending'}"><span>${l}</span><span>${ok?'🟢 Approved':'🔴 Pending - WhatsApp me bhejiye'}</span></div>`;}).join('')}</div>`;}
    function whatsappInstruction(){return `<div class="card p-4 mb-4 border-l-4 border-l-blue-600"><h3 class="font-black text-lg">WhatsApp Proof Checklist</h3><p class="text-sm text-slate-600 mt-1">Video, item list, bill copy aur payment screenshot official WhatsApp group me bhejna hai. Company Execution Software me approve karegi; approve hone ke baad yahan green dikhega.</p></div>`;}
    function dashboard(){ const jobs=myJobs().slice(0,3); const first=jobs[0]||{}; document.getElementById('content').innerHTML=`<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 grid-auto"><div class="card p-5"><h3 class="font-black text-xl mb-3">Today Work</h3>${jobs.length?jobs.map(jobCard).join('<div class="h-3"></div>'):empty('No assigned job found.')}</div><div class="card p-5"><h3 class="font-black text-xl mb-3">Required Proof Checklist</h3><p class="text-sm text-slate-500 font-bold">Pending items blink karenge. Company approve karegi to green ho jayega.</p>${proofChecklist(first)}</div></div>`; }
    function renderJobs(){ const jobs=myJobs(); document.getElementById('content').innerHTML=`${whatsappInstruction()}<div class="space-y-4">${jobs.length?jobs.map(jobCard).join(''):empty('No planning/job record assigned to you yet.')}</div>`; }
    window.updateJob=async(id,st)=>{await setDoc(doc(db,MAIN,id),{status:st,updatedBy:currentUser.name,updatedAt:serverTimestamp()},{merge:true});toast('Job status updated: '+st)};
    function formBlock(mod,title,...fields){ document.getElementById('content').innerHTML=`<div class="card p-5 max-w-2xl"><h3 class="font-black text-xl mb-4">${title}</h3><div class="grid grid-cols-1 gap-3">${fields.map(f=>input(f)).join('')}<button onclick="saveForm('${mod}')" class="btn bg-blue-700 text-white">Save Permanent Record</button></div></div><div class="mt-4 space-y-3">${myRecords(mod).slice(0,10).map(recordMini).join('')||''}</div>`; }
    const input=([k,l,t='text',opts])=>`<label><span class="font-bold text-sm">${l}</span>${t==='select'?`<select id="f_${k}" class="field mt-1">${opts.map(o=>`<option>${o}</option>`).join('')}</select>`:t==='textarea'?`<textarea id="f_${k}" class="field mt-1" rows="3"></textarea>`:`<input id="f_${k}" type="${t}" class="field mt-1" ${t==='date'?`value="${today()}"`:''}>`}</label>`;
    window.saveForm=async(mod)=>{const data={module:mod,collection:mod,role:currentUser.role,employee_name:currentUser.name,driver_name:currentUser.role==='Driver'?currentUser.name:'',worker_name:currentUser.role==='Worker'?currentUser.name:'',updatedAt:serverTimestamp(),createdAt:serverTimestamp()}; document.querySelectorAll('[id^="f_"]').forEach(e=>data[e.id.slice(2)]=e.value); await setDoc(doc(db,MAIN,sid(mod+'_'+currentUser.name+'_'+Date.now())),data,{merge:true}); toast('Saved permanently');};
    window.submitSimple=async(mod,obj)=>{await setDoc(doc(db,MAIN,sid(mod+'_'+currentUser.name+'_'+Date.now())),{module:mod,collection:mod,employee_name:currentUser.name,driver_name:currentUser.role==='Driver'?currentUser.name:'',worker_name:currentUser.role==='Worker'?currentUser.name:'',role:currentUser.role,...obj,updatedAt:serverTimestamp(),createdAt:serverTimestamp()},{merge:true});toast('Status saved permanently')};

    function staffMoneySettings(){
      const payrollRows = myRecords('payroll').filter(r=>String(r.employee_name||r.driver_name||r.worker_name||'').trim().toLowerCase()===String(currentUser?.name||'').trim().toLowerCase());
      const latestPayroll = payrollRows.sort((a,b)=>(b.updatedAtMs||0)-(a.updatedAtMs||0))[0] || {};
      const salary = Number(latestPayroll.salary || latestPayroll.monthly_salary || (String(currentUser?.name||'').trim().toLowerCase()==='mahesh'?20000:0));
      const fooding = Number(latestPayroll.fooding_per_day || latestPayroll.fooding || latestPayroll.fooding_amount || (currentUser?.role==='Driver'?250:150));
      const salaryDay = salary ? Math.round(salary/30) : 300;
      return {salary, fooding, salaryDay, totalDay: salaryDay + fooding};
    }
    function deductionBoxHtml(){
      const d = staffMoneySettings();
      return `<div class="azp-impact space-y-2">
        <div class="text-emerald-700 font-black">🟢 Monthly Salary: ${money(d.salary)}</div>

    function addDaysISO(dateStr, days){
      const base = dateStr ? new Date(dateStr+'T00:00:00') : new Date();

      base.setDate(base.getDate()+Number(days||0));
      return base.toISOString().slice(0,10);
    }

        const isBlack = st.toLowerCase().includes('black');
        const pct = r.percentage_level || r.score || (isBlack ? 0 : 100);
        return `<div class="border rounded-2xl p-4 ${isBlack?'bg-red-50 border-red-200':'bg-emerald-50 border-emerald-200'}">
          <div class="flex items-center justify-between gap-2">
            <span class="chip ${isBlack?'bg-red-100 text-red-800':'bg-emerald-100 text-emerald-800'}">${esc(st)}</span>
            <span class="text-2xl font-black ${isBlack?'text-red-800':'text-emerald-800'}">${esc(pct)}%</span>
          </div>
          <p class="mt-2 font-black">${isBlack?'Restricted / Blacklist Level':'Trusted / Whitelist Level'}</p>
          <p class="text-sm text-slate-600 mt-1">${esc(r.reason||r.company_remark||'')}</p>
          ${r.date?`<p class="text-xs text-slate-500 mt-2">Date: ${esc(r.date)}</p>`:''}
        </div>`;
      };

      document.getElementById('content').innerHTML=`<div class="card p-5">
        <h3 class="font-black text-xl mb-3">Blacklist / Whitelist Percentage Level</h3>
        ${rows.length ? rows.map(card).join('') : empty('No blacklist/whitelist record for you.')}
      </div>`;
    }
    function vehicle(){ const vehs=byModule('vehicleMaster').filter(isMine), docs=byModule('documents').filter(d=>vehs.some(v=>v.vehicle_number===d.vehicle_number)||isMine(d)); document.getElementById('content').innerHTML=`<div class="space-y-3"><div class="card p-5"><h3 class="font-black text-xl">Vehicle Document Renewal Date</h3></div>${[...vehs,...docs].map(r=>`<div class="card p-4"><b>${esc(r.vehicle_number)}</b><div class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-2 text-sm"><div>Insurance<br><b>${esc(r.insurance_expiry||'-')}</b></div><div>Pollution<br><b>${esc(r.pollution_expiry||'-')}</b></div><div>Fitness<br><b>${esc(r.fitness_expiry||'-')}</b></div><div>Permit<br><b>${esc(r.permit_expiry||'-')}</b></div></div></div>`).join('')||empty('No assigned vehicle document found.')}</div>`; }
    function repairing(){ const rows=myRecords('repairing'); document.getElementById('content').innerHTML=`<div class="space-y-3"><div class="card p-5"><h3 class="font-black text-xl">Repairing Details</h3><button onclick="submitSimple('repairing',{repair_date:today(),repair_status:'Emergency',description:'Driver reported new repairing issue',amount:0})" class="btn bg-red-700 text-white mt-3">Report New Repair Issue</button></div>${rows.map(r=>`<div class="card p-4"><b>${esc(r.vehicle_number||'Vehicle')}</b><p>${esc(r.repair_date||'')} | ${esc(r.repair_type||r.repair_status||'')}</p><p class="text-sm text-slate-500">${esc(r.description||r.remarks||'')}</p><p class="chip bg-red-100 text-red-800 mt-2">${money(r.amount)}</p></div>`).join('')||empty('No repair record assigned to you.')}</div>`; }
    function rules(){ document.getElementById('content').innerHTML=`<div class="card p-5"><h3 class="font-black text-xl mb-4">Rules To Appear On Device</h3>${companyRules.map((r,i)=>`<div class="flex gap-3 border rounded-2xl p-3 mb-2"><span class="font-black text-blue-700">${i+1}</span><b>${esc(r)}</b></div>`).join('')}</div>`; }

    async function boot(){ window.refreshNames(); const saved=localStorage.getItem('azp_staff_login'); try{unsub=onSnapshot(query(collection(db,MAIN)),snap=>{all=snap.docs.map(d=>{const v=d.data();return{id:d.id,...v,updatedAtMs:v.updatedAt?.toMillis?.()||0}});status('Firebase Connected',true);window.refreshNames(); if(saved&&!currentUser){currentUser=JSON.parse(saved);document.getElementById('loginPanel').classList.add('hidden');document.getElementById('appPanel').classList.remove('hidden');buildNav();} render();},err=>{console.error(err);status('Rules Issue',false);toast('Firebase rules issue. Check rules.',true)});}catch(e){status('Connection Failed',false)} }
    boot(); window.today=today;
  </script>
</body>
</html>
