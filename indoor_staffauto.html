 16px;font-weight:900;display:none;z-index:50}.toast.show{display:block}.small{font-size:12px;color:#64748b;font-weight:850}.task-guide{border:1px solid #dbeafe;background:#f8fbff;border-radius:16px;padding:10px 12px;margin:9px 0;font-size:12.5px;font-weight:850;line-height:1.45}.task-guide .en{color:#0f172a;margin-bottom:5px}.task-guide .od{color:#1d4ed8}.task-guide b{font-weight:950}

</head><body><div class="app"><header class="hero"><div class="brand"><div class="logo">👷</div><div><h1>A TO Z Staff App</h1><p class="sub">Compact • Advance Workflow • Bilingual Task</p></div></div><div id="fbStatus" class="pill">Connecting Firebase...</div></header><div class="wrap"><section id="loginBox" class="login"><h2>Staff Login</h2><div class="field"><label>Role</label><select id="loginRole"><option>Indoor</option><option>Outdoor</option><option>Driver</option><option>Worker</option><option>Office</option><option>Team Leader</option></select></div><div class="field"><label>Staff Name</label><input id="loginName" placeholder="Srinivas / Gayatri"></div><div class="field"><label>Mobile optional</label><input id="loginPhone" inputmode="tel"></div><button class="btn full" onclick="login()">Open My Dashboard</button></section><section id="dash" class="hidden"><div class="panel"><div class="topbar"><div><div class="who" id="who">Staff</div><div class="role" id="role">Role</div></div><button class="btn gray" onclick="logout()">Logout</button></div><div class="stats"><div class="stat"><b id="total">0</b><span>Total</span></div><div class="stat"><b id="pending">0</b><span>Pending</span></div><div class="stat"><b id="todayCnt">0</b><span>Today</span></div><div class="stat azp-score-stat"><b id="todayScore">100</b><span>Today Score</span></div><div class="stat azp-score-stat"><b id="totalScore">100</b><span>Total Score</span></div><div class="stat azp-score-stat"><b id="prevDays">0</b><span>Previous Days</span></div></div><input class="search" id="search" placeholder="Search your tasks..." oninput="render()"><div class="filters" id="filters"></div></div><div id="taskList"></div></section></div></div><div id="toast" class="toast"></div><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script>
const firebaseConfig = {
  apiKey: 'AIzaSyC4I13JSUkhun5DgpgLlnyiimTzdPobT14',
  authDomain: 'az-packers-quotation.firebaseapp.com',
  projectId: 'az-packers-quotation',
  storageBucket: 'az-packers-quotation.firebasestorage.app',
  messagingSenderId: '682004383688',
  appId: '1:682004383688:web:b795a19579dba9a612a2fd'
};
let db=null, me=null, allTasks=[], currentFilter='All'; const $=id=>document.getElementById(id); const STAGES=['New Lead','Item List','Quotation','Advance','Planning','Execution','Balance Payment','Feedback','Review'];
function norm(v){return String(v||'').trim().toLowerCase()} function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))} function today(){return new Date().toISOString().slice(0,10)} function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function init(){try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();$('fbStatus').textContent='Firebase Connected'}catch(e){$('fbStatus').textContent='Firebase Error';console.error(e)} setInterval(()=>{if(me)render()},60000); const saved=localStorage.getItem('azp_staff_login_clean'); if(saved){const s=JSON.parse(saved); $('loginName').value=s.name;$('loginRole').value=s.role;$('loginPhone').value=s.phone||''; login()}}
function login(){const name=$('loginName').value.trim(); if(!name)return toast('Name required'); me={name,role:$('loginRole').value,phone:$('loginPhone').value.replace(/\D/g,'')}; localStorage.setItem('azp_staff_login_clean',JSON.stringify(me)); $('loginBox').classList.add('hidden'); $('dash').classList.remove('hidden'); $('who').textContent=me.name; $('role').textContent=me.role+(me.phone?' • '+me.phone:''); startSync()}
function logout(){localStorage.removeItem('azp_staff_login_clean'); location.reload()}
function cleanStatus(s){s=String(s||'Pending'); if(s==='WaitingAdminApproval')return 'Waiting Admin Approval'; return s}
function matches(t){const n=norm(me.name), r=norm(me.role), p=me.phone.slice(-10); const tn=norm(t.assigned_staff||t.staffName), tr=norm(t.assign_role), tp=String(t.staff_mobile||t.phone||'').replace(/\D/g,'').slice(-10); return (tn===n)||(tn.includes(n)&&n.length>2)||(p&&tp&&p===tp)||(tr===r&&!tn)}
function docToTask(doc){const d={_docId:doc.id,...doc.data()}; if(d.module!=='taskManagement')return null; if(d.source!=='CRM_SINGLE_LIVE')return null; if(['Approved','Completed','Cancelled'].includes(cleanStatus(d.status)))return null; return d}
function startSync(){if(!db)return; db.collection('azpExecutionRecords').onSnapshot(s=>{const map=new Map(); s.forEach(doc=>{const d=doc.data()||{}; if(d.module==='staffControl'){azpApplyControl(d); return;} const t=docToTask(doc); if(!t||!matches(t))return; const key=t.leadId||t.id||doc.id; const old=map.get(key); if(!old||(t.updatedAtMs||0)>(old.updatedAtMs||0))map.set(key,t)}); allTasks=[...map.values()].sort((a,b)=>(b.priorityScore||0)-(a.priorityScore||0)||dueMs(a)-dueMs(b)); render()},e=>{console.error(e);toast('Firebase read issue')})}
function dueMs(t){const n=new Date((t.due_date||today())+'T'+(t.due_time||'23:59')).getTime(); return isNaN(n)?9999999999999:n} function isFuture(t){return dueMs(t)>Date.now()+60000} function isScheduledHold(t){return (t.scheduled_hold===true||t.status==='Scheduled')&&isFuture(t)} function isToday(t){return t.due_date===today()}
function nextStage(stage){const i=STAGES.indexOf(stage); return i>=0&&i<STAGES.length-1?STAGES[i+1]:stage}
function nextTaskTitle(t,stage){return `CRM TASK: ${t.customer_name||'Customer'} - ${stage} (${t.customer_priority||'Warm'})`}
function nextComment(t,stage){return `[CRM:${t.leadId}] ${stage} task for ${t.customer_name||'Customer'}. Route: ${t.from||'-'} to ${t.to||'-'}. Mobile: ${t.customer_mobile||'-'}.`}
async function updateTask(t,patch){await db.collection('azpExecutionRecords').doc(t._docId).set({...patch,updatedAtMs:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); try{await db.collection('taskMaster').doc(t.id).set(patch,{merge:true})}catch(e){}}
async function startTask(id){const t=allTasks.find(x=>x._docId===id); if(t)await updateTask(t,{status:'In Progress'}); toast('Started')}
async function completeNext(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const st=t.workflow_stage||'New Lead'; if(st==='Item List'){toast('Choose Item Received / Item Later / Cancel'); return} if(st==='Negotiation'){toast('Choose Confirm / Cancel / Follow-up Later'); return} const ns=nextStage(st); const patch={workflow_stage:ns,status:'Pending',scheduled_hold:false,task_title:nextTaskTitle(t,ns),title:nextTaskTitle(t,ns),comments:nextComment(t,ns),comment:nextComment(t,ns),due_date:today(),due_time:'11:00',priority: t.customer_priority==='Hot'?'Very Urgent':'Urgent'}; await updateTask(t,patch); await updateLead(t,{stage:ns,dueDate:today(),dueTime:'11:00'}); toast('Moved to '+ns)}
async function updateLead(t,patch){if(!t.leadId)return; await db.collection('azpExecutionRecords').doc('CRM_LEAD_'+t.leadId).set({...patch,updatedAtMs:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})}
async function itemReceived(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const ns='Quotation'; const patch={workflow_stage:ns,status:'Pending',scheduled_hold:false,task_title:nextTaskTitle(t,ns),title:nextTaskTitle(t,ns),comments:nextComment(t,ns)+' Item list received.',comment:nextComment(t,ns)+' Item list received.',due_date:today(),due_time:'11:00',priority:t.customer_priority==='Hot'?'Very Urgent':'Urgent'}; await updateTask(t,patch); await updateLead(t,{stage:ns,dueDate:today(),dueTime:'11:00',followupHold:false}); toast('Item received. Quotation task created')}
async function itemLater(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const d=prompt('Item List follow-up date YYYY-MM-DD', today()); if(!d)return; const tm=prompt('Item List follow-up time HH:MM','11:00'); if(!tm)return; const reason=prompt('Reason','Customer will send item list later')||''; const future=new Date(d+'T'+tm).getTime()>Date.now()+60000; const patch={workflow_stage:'Item List',status:future?'Scheduled':'Pending',scheduled_hold:future,task_title:nextTaskTitle(t,'Item List'),title:nextTaskTitle(t,'Item List'),comments:nextComment(t,'Item List')+' Reason: '+reason,comment:nextComment(t,'Item List')+' Reason: '+reason,due_date:d,due_time:tm,priority:future?'Scheduled':(t.customer_priority==='Hot'?'Very Urgent':'Urgent')}; await updateTask(t,patch); await updateLead(t,{stage:'Item List',dueDate:d,dueTime:tm,remarks:reason,followupHold:future,followReason:reason}); toast(future?'Item List task scheduled. Due time par show hoga.':'Item List follow-up due now')}
async function confirmTask(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; await updateTask(t,{workflow_stage:'Confirmed',status:'Pending',task_title:nextTaskTitle(t,'Confirmed'),comments:nextComment(t,'Confirmed'),due_date:today(),due_time:'11:00'}); await updateLead(t,{stage:'Confirmed',status:'Active'}); toast('Confirmed')}
async function cancelTask(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const reason=prompt('Cancel reason?')||'Cancelled by customer'; await updateTask(t,{status:'Cancelled',workflow_stage:'Cancelled',comments:'Cancelled: '+reason}); await updateLead(t,{stage:'Cancelled',status:'Cancelled',remarks:reason}); toast('Cancelled - no next task')}
async function laterTask(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const d=prompt('Follow-up date YYYY-MM-DD', today()); if(!d)return; const tm=prompt('Follow-up time HH:MM','11:00'); if(!tm)return; const reason=prompt('Reason','Customer asked to call later')||''; const future=new Date(d+'T'+tm).getTime()>Date.now()+60000; await updateTask(t,{workflow_stage:'Follow-up',status:future?'Scheduled':'Pending',scheduled_hold:future,task_title:nextTaskTitle(t,'Follow-up'),comments:nextComment(t,'Follow-up')+' Reason: '+reason,due_date:d,due_time:tm,priority:future?'Scheduled':(t.customer_priority==='Hot'?'Very Urgent':'Urgent')}); await updateLead(t,{stage:'Follow-up',dueDate:d,dueTime:tm,remarks:reason,followupHold:future,followReason:reason}); toast(future?'Follow-up scheduled. Task due time par show hoga.':'Follow-up due now')}
function copyMsg(t){navigator.clipboard.writeText(`A TO Z Task\nCustomer: ${t.customer_name||'-'}\nMobile: ${t.customer_mobile||'-'}\nStage: ${t.workflow_stage||'-'}\nFrom-To: ${t.from||'-'} to ${t.to||'-'}\nDue: ${t.due_date||'-'} ${t.due_time||''}`); toast('Copied')}
function wa(t){let p=String(t.customer_mobile||'').replace(/\D/g,''); if(p.length===10)p='91'+p; if(!p)return toast('Customer mobile missing'); window.open(`https://wa.me/${p}`,'_blank')}
function renderFilters(){const arr=['All','Pending','In Progress','Today','Scheduled']; $('filters').innerHTML=arr.map(f=>`<button class="filter ${currentFilter===f?'active':''}" onclick="currentFilter='${f}';render()">${f}</button>`).join('')}
function filterTask(t){const st=cleanStatus(t.status); if(isScheduledHold(t)) return currentFilter==='Scheduled'; if(currentFilter==='All')return true; if(currentFilter==='Today')return isToday(t); if(currentFilter==='Scheduled')return false; return st===currentFilter}
function render(){renderFilters(); const q=norm($('search').value); const visibleBase=allTasks.filter(t=>!isScheduledHold(t)); let list=allTasks.filter(t=>filterTask(t)).filter(t=>!q||[t.task_title,t.customer_name,t.customer_mobile,t.from,t.to,t.comments].join(' ').toLowerCase().includes(q)); $('total').textContent=visibleBase.length; $('pending').textContent=visibleBase.filter(t=>cleanStatus(t.status)==='Pending').length; $('todayCnt').textContent=visibleBase.filter(isToday).length; azpUpdateScores(); $('taskList').innerHTML=list.length?list.map((t,i)=>card(t,i)).join(''):'<div class="empty">No task found for your login.</div>'}
function taskGuideEnglish(stage){
 const m={
  'New Lead':'Call the customer and understand the shifting requirement clearly.',
  'Item List':'Call the customer and collect the complete household item list.',
  'Quotation':'Prepare and send the quotation after verifying the item list.',
  'Follow-up':'Contact the customer and discuss the quotation details.',
  'Negotiation':'Speak with the customer and try to finalize the booking decision.',
  'Confirmed':'Obtain the customer\'s final booking confirmation.',
  'Planning':'Finalize the vehicle, driver, workers, and work schedule.',
  'Payment':'Verify and collect the pending payment from the customer.',
  'Execution':'Monitor the shifting work from loading to delivery.',
  'Feedback':'Collect the customer\'s service feedback.',
  'Review':'Request the customer to submit a Google review.',
  'Cancelled':'This customer workflow is cancelled and no further task is required.'
 };
 return m[stage]||'Complete this customer task and update the latest status.';
}

/* ===== AZP PERMANENT WORKFLOW STAGE UPDATE FIX - SAME CARD NEXT STAGE =====
   Fixes: Complete & Next toast appears but task remains same.
   Method: update BOTH CRM lead document and task document using every possible ID,
   then update local card immediately before Firestore snapshot returns.
*/
function azpTaskLeadId(t){
  if(!t) return '';
  let lid = String(t.leadId || t.lead_id || t.crmLeadId || '').trim();
  if(!lid && t.id) lid = String(t.id).replace(/^TASK_/,'').trim();
  if(!lid && t._docId) lid = String(t._docId).replace(/^CRM_TASK_/,'').replace(/^TASK_/,'').trim();
  if(!lid){
    const m = String(t.comments || t.comment || '').match(/\[CRM:([^\]]+)\]/i);
    if(m) lid = m[1].trim();
  }
  return lid;
}
function azpTaskDocIds(t){
  const ids = new Set();
  const lid = azpTaskLeadId(t);
  if(t && t._docId) ids.add(String(t._docId));
  if(t && t.id) ids.add(String(t.id));
  if(lid){ ids.add('CRM_TASK_'+lid); ids.add('TASK_'+lid); }
  return [...ids].filter(Boolean);
}
function azpLeadDocIds(t){
  const lid = azpTaskLeadId(t);
  const ids = new Set();
  if(lid){ ids.add('CRM_LEAD_'+lid); ids.add(lid); }
  return [...ids].filter(Boolean);
}
function azpBuildPatch(t, stage){
  const lid = azpTaskLeadId(t);
  const title = nextTaskTitle(t, stage);
  const comment = nextComment(t, stage);
  return {
    leadId: lid,
    workflow_stage: stage,
    stage: stage,
    status: 'Pending',
    staff_app_status: 'Pending',
    task_status: 'Pending',
    admin_approval: '',
    scheduled_hold: false,
    followupHold: false,
    task_title: title,
    title: title,
    comments: comment,
    comment: comment,
    due_date: today(),
    dueDate: today(),
    due_time: '11:00',
    dueTime: '11:00',
    priority: (t.customer_priority === 'Hot' ? 'Very Urgent' : 'Urgent'),
    updatedAtMs: Date.now(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
}
async function azpSaveStageEverywhere(t, stage){
  if(!db || !t) throw new Error('Firebase/task missing');
  const lid = azpTaskLeadId(t);
  const taskPatch = azpBuildPatch(t, stage);
  const leadPatch = {
    id: lid,
    stage: stage,
    workflow_stage: stage,
    status: 'Active',
    dueDate: today(),
    due_date: today(),
    dueTime: '11:00',
    due_time: '11:00',
    followupHold: false,
    scheduled_hold: false,
    updatedAtMs: Date.now(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  const writes = [];
  azpTaskDocIds(t).forEach(id => writes.push(db.collection('azpExecutionRecords').doc(id).set(taskPatch,{merge:true})));
  azpLeadDocIds(t).forEach(id => writes.push(db.collection('azpExecutionRecords').doc(id).set(leadPatch,{merge:true})));
  if(lid) writes.push(db.collection('taskMaster').doc('TASK_'+lid).set(taskPatch,{merge:true}).catch(()=>{}));
  await Promise.all(writes);
  // Immediate local update so user sees change without waiting for network snapshot
  Object.assign(t, taskPatch);
  const idx = allTasks.findIndex(x => x._docId === t._docId || azpTaskLeadId(x) === lid);
  if(idx >= 0) Object.assign(allTasks[idx], taskPatch);
  render();
}

function azpSafeLeadId(t){

  };

async function azpWriteSafeStage(t,stage){
  const lid=azpSafeLeadId(t); if(!lid) throw new Error('Lead ID missing');

/* ===== AZP STAGE-SPECIFIC FOLLOW-UP + SLA SCHEDULE PATCH ===== */
function azpPad(n){return String(n).padStart(2,'0')}
function azpDateObj(dateStr,timeStr){
  const d = new Date((dateStr||today())+'T'+(timeStr||'11:00'));
  return isNaN(d.getTime()) ? new Date() : d;
}
function azpAddDays(dateStr,days){
  const d = new Date((dateStr||today())+'T00:00');
  d.setDate(d.getDate()+Number(days||0));
  return d.toISOString().slice(0,10);
}
function azpTimePlusMinutes(mins){
  const d=new Date(Date.now()+Number(mins||15)*60000);
  return azpPad(d.getHours())+':'+azpPad(d.getMinutes());
}
function azpIsFutureDT(d,t){ return azpDateObj(d,t).getTime() > Date.now()+60000; }
function azpStageSlaMinutes(stage){
  const s=String(stage||'');
  if(s==='Vendor Arrangement') return 24*60;
  if(s==='WhatsApp Job Allotment') return 60;
  return 0;
}
function azpIsOverdueStage(t){
  const due=azpDateObj(t.due_date||t.dueDate,t.due_time||t.dueTime).getTime();
  return due < Date.now()-60000;
}
function azpDefaultNextDue(t,stage){
  const baseDate=t.due_date||t.dueDate||today();
  const baseTime=t.due_time||t.dueTime||'11:00';
  if(stage==='Vendor Follow-up') return {date:baseDate,time:baseTime};
  if(stage==='Item Video + Bill + 90% Payment') return {date:azpAddDays(baseDate,1),time:'11:00'};
  if(stage==='Online Review') return {date:baseDate,time:baseTime};
  if(stage==='Physical Feedback') return {date:azpAddDays(baseDate,2),time:'11:00'};
  if(stage==='Reference Follow-up') return {date:azpAddDays(baseDate,3),time:'11:00'};
  return {date:today(),time:'11:00'};
}
function azpBuildScheduledPatch(t,stage,date,time,reason){
  const lid=azpSafeLeadId(t);
  const future=azpIsFutureDT(date,time);
  const title=(t.customer_name||'Customer')+' - '+stage;
  const guide=taskGuideEnglish(stage);
  const comment='[CRM:'+lid+'] '+guide+' Route: '+(t.from||'-')+' to '+(t.to||'-')+'. Mobile: '+(t.customer_mobile||'-')+'. '+(reason?('Note: '+reason):'');
  return {
    module:'taskManagement',collection:'taskManagement',source:'CRM_SINGLE_LIVE',
    leadId:lid,workflow_stage:stage,stage:stage,
    status:future?'Scheduled':'Pending',staff_app_status:future?'Scheduled':'Pending',task_status:future?'Scheduled':'Pending',admin_approval:'',
    scheduled_hold:future,followupHold:future,followReason:reason||'',
    task_title:title,title:title,comments:comment,comment:comment,
    due_date:date,dueDate:date,due_time:time,dueTime:time,
    priority:future?'Scheduled':(t.customer_priority==='Hot'?'Very Urgent':'Urgent'),
    updatedAtMs:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };
}
async function azpWriteStageWithDue(t,stage,date,time,reason){
  const lid=azpSafeLeadId(t); if(!lid) throw new Error('Lead ID missing');
  const patch=azpBuildScheduledPatch(t,stage,date,time,reason||'');
  // Keep local override only for visible/non-future task. Future tasks should hide until due.
  if(!patch.scheduled_hold) azpSetLocalStage(t,stage);
  Object.assign(t,patch);
  allTasks = allTasks.map(x => (azpSafeLeadId(x)===lid ? Object.assign(x,patch) : x));
  render();
  const leadPatch={id:lid,module:'crmLead',stage:stage,workflow_stage:stage,status:'Active',dueDate:date,dueTime:time,due_date:date,due_time:time,followupHold:patch.scheduled_hold,scheduled_hold:patch.scheduled_hold,followReason:reason||'',remarks:reason||'',updatedAtMs:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
  const writes=[];
  if(t._docId) writes.push(db.collection('azpExecutionRecords').doc(String(t._docId)).set(patch,{merge:true}));
  writes.push(db.collection('azpExecutionRecords').doc('CRM_TASK_'+lid).set(patch,{merge:true}));
  writes.push(db.collection('azpExecutionRecords').doc('CRM_LEAD_'+lid).set(leadPatch,{merge:true}));
  try{writes.push(db.collection('taskMaster').doc('TASK_'+lid).set(patch,{merge:true}));}catch(e){}
  await Promise.all(writes);
}

// Follow Up Next rules requested by Manoj ji.
async function followNextStage(id,mode){
  try{
    const t=allTasks.find(x=>x._docId===id || x.id===id || azpSafeLeadId(x)===id);
    if(!t){toast('Record not found');return;}
    const stage=t.workflow_stage||t.stage||'New Lead';
    let d=today(), tm='11:00', label='Follow-up';
    if(mode==='timeOnly15'){
      label='Job allotment follow-up';
      tm=prompt('Next follow-up time HH:MM (15 minutes gap recommended)', azpTimePlusMinutes(15));
      if(!tm)return;
      d=today();
      if(!/^\d{2}:\d{2}$/.test(tm)){toast('Enter valid time like 11:15');return;}
    }else{
      label=stage+' follow-up';
      d=prompt(label+' date YYYY-MM-DD', t.due_date||t.dueDate||today());
      if(!d)return;
      tm=prompt(label+' time HH:MM', t.due_time||t.dueTime||'11:00');
      if(!tm)return;
    }
    let reason=prompt('Remark / reason', label)||'';
    await azpWriteStageWithDue(t,stage,d,tm,reason);
    const future=azpIsFutureDT(d,tm);
    toast(future ? 'Follow-up scheduled. It will show at selected time.' : 'Follow-up due now.');
  }catch(e){console.error(e);toast('Follow-up schedule failed: '+(e.message||e));}
}

/* ===== AZP FINAL NO-HIDE WORKFLOW PATCH v5 - REAL FIX =====
   Root fix: old docToTask filtered Completed/Approved before local stage override.
   This made the card disappear after Complete & Next on some devices/snapshots.
   New rule: CRM_SINGLE_LIVE task is never hidden after Complete & Next; same task stays Pending and moves stage.
*/
function azpFindTaskByAnyId(id){
  return allTasks.find(x => x._docId===id || x.id===id || x.leadId===id || azpSafeLeadId(x)===id) || null;
}
function azpRawDocToTask(doc){
  const d={_docId:doc.id,...doc.data()};
  if(d.module!=='taskManagement') return null;
  if(d.source!=='CRM_SINGLE_LIVE') return null;
  const st=cleanStatus(d.status);
  if(st==='Cancelled') return null;
  // Important: Do NOT hide Completed/Approved snapshots for CRM workflow.
  // The workflow card must remain visible and move to next stage.
  if(st==='Completed' || st==='Approved' || d.task_status==='Completed' || d.staff_app_status==='Completed'){
    d.status='Pending'; d.task_status='Pending'; d.staff_app_status='Pending';
  }
  const localStage = azpGetLocalStage ? azpGetLocalStage(d) : '';
  if(localStage){ d.workflow_stage=localStage; d.stage=localStage; d.status='Pending'; d.task_status='Pending'; d.staff_app_status='Pending'; d.scheduled_hold=false; }
  return d;
}
docToTask = azpRawDocToTask;
startSync = function(){
  if(!db) return;
  db.collection('azpExecutionRecords').onSnapshot(s=>{
    const map=new Map();
    s.forEach(doc=>{
      const t=docToTask(doc);
      if(!t || !matches(t)) return;
      const key=azpSafeLeadId(t) || t.leadId || t.id || doc.id;
      const old=map.get(key);
      const localStage = azpGetLocalStage ? azpGetLocalStage(t) : '';
      const scoreNew=(localStage?9999999999999:0)+(t.updatedAtMs||0);
      const scoreOld=old?((azpGetLocalStage && azpGetLocalStage(old)?9999999999999:0)+(old.updatedAtMs||0)):0;
      if(!old || scoreNew>=scoreOld) map.set(key,t);
    });
    allTasks=[...map.values()].sort((a,b)=>(b.priorityScore||0)-(a.priorityScore||0)||dueMs(a)-dueMs(b));
    render();
  },e=>{console.error(e);toast('Firebase read issue')});
};
function azpForceVisiblePatch(t,stage){
  const lid=azpSafeLeadId(t);

updateTask = async function(t,patch){

/* ===== AZP RECENT INPUT TOP PERMANENT FIX v8 =====
   Problem fixed: fresh CRM lead was going to bottom in Indoor Staff App.
   Rule: latest CRM save/input always appears at top. Priority/due date will NOT push a fresh task down.
*/
function azpRecentMsV8(t){
  if(!t) return 0;
  const nums=[t.createdAtMs,t.updatedAtMs,t.savedAtMs,t.crmSavedAtMs,t.orderMs,t.timestampMs]
    .map(x=>Number(x||0)).filter(x=>isFinite(x)&&x>0);
  if(nums.length) return Math.max(...nums);
  const ids=[t.leadId,t.id,t._docId,t.crmLeadId].map(x=>String(x||''));
  for(const s of ids){
    const m=s.match(/(\d{11,})/);
    if(m) return Number(m[1]);
  }
  const dateTime=String(t.createdAt||t.updatedAt||t.due_date||t.dueDate||'');
  const d=Date.parse(dateTime);
  return isNaN(d)?0:d;
}
function azpRecentFirstV8(a,b){
  const rb=azpRecentMsV8(b), ra=azpRecentMsV8(a);
  if(rb!==ra) return rb-ra;
  return String(b._docId||b.id||'').localeCompare(String(a._docId||a.id||''));
}
function azpDocToTaskRecentV8(doc){
  const d={_docId:doc.id,...doc.data()};
  if(d.module!=='taskManagement') return null;
  if(d.source && d.source!=='CRM_SINGLE_LIVE' && d.task_source!=='CRM_SINGLE_LIVE') return null;
  const st=cleanStatus(d.status);
  if(st==='Cancelled') return null;
  if(st==='Completed' || st==='Approved' || d.task_status==='Completed' || d.staff_app_status==='Completed'){
    d.status='Pending'; d.task_status='Pending'; d.staff_app_status='Pending';
  }
  if(!d.createdAtMs){
    const idText=String(d.leadId||d.id||doc.id||'');
    const m=idText.match(/(\d{11,})/);
    if(m) d.createdAtMs=Number(m[1]);
  }
  if(!d.updatedAtMs) d.updatedAtMs=d.createdAtMs||0;
  try{
    const localStage = (typeof azpGetLocalStage==='function') ? azpGetLocalStage(d) : '';
    if(localStage){ d.workflow_stage=localStage; d.stage=localStage; d.status='Pending'; d.task_status='Pending'; d.staff_app_status='Pending'; d.scheduled_hold=false; }
  }catch(e){}
  return d;
}
docToTask = azpDocToTaskRecentV8;
startSync = function(){
  if(!db) return;
  db.collection('azpExecutionRecords').onSnapshot(s=>{
    const map=new Map();
    s.forEach(doc=>{
      const t=docToTask(doc);
      if(!t || !matches(t)) return;
      const key=(typeof azpSafeLeadId==='function' && azpSafeLeadId(t)) || t.leadId || t.id || doc.id;
      const old=map.get(key);
      if(!old || azpRecentMsV8(t)>=azpRecentMsV8(old)) map.set(key,t);
    });
    allTasks=[...map.values()].sort(azpRecentFirstV8);
    render();
  },e=>{console.error(e);toast('Firebase read issue')});
};
const azpOldRenderV8 = render;
render = function(){
  try{ allTasks = (allTasks||[]).sort(azpRecentFirstV8); }catch(e){}
  return azpOldRenderV8();
};


/* ===== AZP DATE + TIME DESCENDING ORDER PERMANENT PATCH =====
   Purpose:
   1) Indoor staff task records always show by due date + due time DESCENDING.
   2) Date is generated with local browser date, not UTC, so India date will not shift.
   3) Missing/wrong time is normalized safely to 11:00.
   4) Existing Firebase fields are not disturbed.
*/
function azpLocalDateToday(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
today = function(){ return azpLocalDateToday(); };

function azpNormalizeDateV9(v){
  v=String(v||'').trim();
  if(!v || /not\s*mentioned|invalid|undefined|null/i.test(v)) return '';
  let m=v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
  m=v.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){
    let y=Number(m[3]); if(y<100)y+=2000;
    return y+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');
  }
  m=v.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  if(m){
    const y=new Date().getFullYear();
    return y+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');
  }
  const d=new Date(v);
  if(!isNaN(d.getTime())){
    const y=d.getFullYear();
    const mo=String(d.getMonth()+1).padStart(2,'0');
    const da=String(d.getDate()).padStart(2,'0');
    return y+'-'+mo+'-'+da;
  }
  return '';
}
function azpNormalizeTimeV9(v){
  v=String(v||'').trim().toLowerCase();
  if(!v || /invalid|undefined|null/i.test(v)) return '11:00';
  let m=v.match(/^(\d{1,2}):(\d{2})\s*(am|pm)?$/i);
  if(m){
    let h=Number(m[1]), mi=Number(m[2]);
    if(m[3]){
      if(m[3]==='pm' && h<12) h+=12;
      if(m[3]==='am' && h===12) h=0;
    }
    if(h>=0 && h<=23 && mi>=0 && mi<=59) return String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0');
  }
  m=v.match(/^(\d{1,2})\s*(am|pm)$/i);
  if(m){
    let h=Number(m[1]);
    if(m[2]==='pm' && h<12) h+=12;
    if(m[2]==='am' && h===12) h=0;
    if(h>=0 && h<=23) return String(h).padStart(2,'0')+':00';
  }
  return '11:00';
}
function azpTaskDateV9(t){
  return azpNormalizeDateV9(t && (t.due_date || t.dueDate || t.task_date || t.taskDate || t.workDate || t.date || t.movingDate)) || today();
}
function azpTaskTimeV9(t){
  return azpNormalizeTimeV9(t && (t.due_time || t.dueTime || t.task_time || t.taskTime || t.workTime || t.time));
}
function azpDateTimeMsDescV9(t){
  const d=azpTaskDateV9(t);
  const tm=azpTaskTimeV9(t);
  const ms=new Date(d+'T'+tm+':00').getTime();
  return isNaN(ms) ? 0 : ms;
}
function azpDateTimeDescSortV9(a,b){
  const bm=azpDateTimeMsDescV9(b), am=azpDateTimeMsDescV9(a);
  if(bm!==am) return bm-am;
  const bu=Number((b&& (b.updatedAtMs||b.createdAtMs||0))||0);
  const au=Number((a&& (a.updatedAtMs||a.createdAtMs||0))||0);
  if(bu!==au) return bu-au;
  return String((b&& (b._docId||b.id))||'').localeCompare(String((a&& (a._docId||a.id))||''));
}
// Date/time dependent helpers now use accurate local date/time.
dueMs = function(t){
  const n=azpDateTimeMsDescV9(t);
  return n || 9999999999999;
};
isToday = function(t){ return azpTaskDateV9(t)===today(); };
// Normalize incoming task date/time without changing other Firebase data.
const azpOldDocToTaskDateV9 = docToTask;
docToTask = function(doc){
  const t = azpOldDocToTaskDateV9(doc);
  if(!t) return t;
  t.due_date = azpTaskDateV9(t);
  t.dueDate = t.due_date;
  t.due_time = azpTaskTimeV9(t);
  t.dueTime = t.due_time;
  return t;
};
// Replace listener order: same records, only final display order is Date+Time DESC.
startSync = function(){
  if(!db) return;
  db.collection('azpExecutionRecords').onSnapshot(s=>{
    const map=new Map();
    s.forEach(doc=>{
      const t=docToTask(doc);
      if(!t || !matches(t)) return;
      const key=(typeof azpSafeLeadId==='function' && azpSafeLeadId(t)) || t.leadId || t.id || doc.id;
      const old=map.get(key);
      if(!old || Number(t.updatedAtMs||t.createdAtMs||0) >= Number(old.updatedAtMs||old.createdAtMs||0)) map.set(key,t);
    });
    allTasks=[...map.values()].sort(azpDateTimeDescSortV9);
    render();
  },e=>{console.error(e);toast('Firebase read issue')});
};
// Always keep visible lists date/time descending, even after filter/search/status change.
const azpOldRenderDateV9 = render;
render = function(){
  try{ allTasks=(allTasks||[]).sort(azpDateTimeDescSortV9); }catch(e){}
  renderFilters();

    .sort(azpDateTimeDescSortV9);
  $('total').textContent=visibleBase.length;
  $('pending').textContent=visibleBase.filter(t=>cleanStatus(t.status)==='Pending').length;
  $('todayCnt').textContent=visibleBase.filter(isToday).length;

let azpScoreBase = 100;
let azpPenalty = 0;
let azpLastControlTs = 0;
let azpTimerEnds = {};
function azpStaffKey(){return norm((me&&me.name)||'staff').replace(/[^a-z0-9]+/g,'_')||'staff'}
function azpLoadScore(){try{const o=JSON.parse(localStorage.getItem('azp_score_'+azpStaffKey())||'{}'); azpScoreBase=Number(o.base||100); azpPenalty=Number(o.penalty||0); azpLastControlTs=Number(o.ts||0);}catch(e){azpScoreBase=100;azpPenalty=0;}}
function azpSaveScore(){try{localStorage.setItem('azp_score_'+azpStaffKey(),JSON.stringify({base:azpScoreBase,penalty:azpPenalty,ts:azpLastControlTs,date:today()}));}catch(e){}}
function azpApplyControl(d){
  if(!me) return;
  const target=norm(d.staffName||d.targetStaff||d.staff||'');
  const mine=norm(me.name||'');
  const all=String(d.staffName||d.targetStaff||'').toLowerCase()==='all' || d.allStaff===true;
  if(!all && target && target!==mine) return;
  const ts=Number(d.updatedAtMs||d.resetAtMs||0);
  if(ts && ts<=azpLastControlTs) return;
  if(d.action==='scoreReset' || d.scoreValue===100){azpScoreBase=100; azpPenalty=0; azpLastControlTs=ts||Date.now(); azpSaveScore(); toast('Admin score reset: 100'); render();}
  if(d.action==='timerReset'){azpResetActiveTimer(false); toast('Admin timer reset: 10 minutes'); render();}
}
function azpUpdateScores(){if(!me)return; azpLoadScore(); const val=Math.max(0,azpScoreBase-azpPenalty); if($('todayScore'))$('todayScore').textContent=val; if($('totalScore'))$('totalScore').textContent=val; if($('prevDays'))$('prevDays').textContent='0';}
function azpTaskKey(t){return (t.leadId||t.id||t._docId||'task').replace(/[^a-zA-Z0-9_-]/g,'_')}
function azpGetEnd(t){const k='azp_timer_'+azpStaffKey()+'_'+azpTaskKey(t); let end=Number(localStorage.getItem(k)||0); if(!end||end<Date.now()){end=Date.now()+10*60*1000; localStorage.setItem(k,String(end));} return end;}
function azpTimeLeft(t){const ms=Math.max(0,azpGetEnd(t)-Date.now()); const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000); return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function azpResetActiveTimer(manual=true){const t=allTasks.filter(x=>!isScheduledHold(x)&&filterTask(x))[0]; if(!t)return; const k='azp_timer_'+azpStaffKey()+'_'+azpTaskKey(t); localStorage.setItem(k,String(Date.now()+10*60*1000)); if(manual){azpPenalty+=3; azpSaveScore(); toast('Timer reset. Score -3');} render();}
function azpTimerHTML(t,i){
  if(i===0){return `<div class="azp-timer-box active"><b>⏱ Active Timer</b><div class="azp-note">Lock open • fresh 10 minutes running</div><div class="azp-time">${azpTimeLeft(t)}</div><div class="azp-note">Penalty: ${azpPenalty}</div><button class="azp-reset" onclick="azpResetActiveTimer(true)">Reset</button></div>`;}
  if(i===1){return `<div class="azp-timer-box locked"><b>🔒 Waiting Timer</b><div class="azp-note">Upar ka active task complete hone ke baad open hoga</div><div class="azp-time">--:--</div><button class="azp-locked-btn" disabled>Locked</button></div>`;}
  return '';
}

<script id="AZP_FINAL_OPEN_TIMER_STAFF_FIX">
(function(){
  function nm(){try{return String((window.me&&me.name)||'').trim();}catch(_e){return '';}}
  function normX(v){try{if(typeof norm==='function')return norm(v);}catch(_e){} return String(v||'').trim().toLowerCase();}
  function sk(){return normX(nm()).replace(/[^a-z0-9]+/g,'_')||'staff';}
  function tk(t){return String((t&&(t.leadId||t.id||t._docId))||'active').replace(/[^a-zA-Z0-9_-]/g,'_');}
  function stateKey(){return 'AZP_DUTY_TIMER_STATE_'+sk();}
  function isMine(d){
    if(!d||!nm())return false;
    const mine=normX(nm());
    const target=normX(d.staffName||d.targetStaff||d.targetStaffName||d.staff||'');
    const targetKey=String(d.targetStaffKey||'').trim().toLowerCase();
    return d.allStaff===true || target==='all' || targetKey==='all' || target===mine || targetKey===sk();
  }
  function saveState(obj){
    localStorage.setItem(stateKey(), JSON.stringify(obj||{}));
  }
  function getState(){try{return JSON.parse(localStorage.getItem(stateKey())||'{}');}catch(_e){return {};}}
  function openNow(endMs){
    const end=Number(endMs||0) || (Date.now()+10*60*1000);
    const st=getState();
    st.timerLocked=false; st.openNow=true; st.timerEndMs=end; st.dutyStartMs=Date.now(); st.updatedAtMs=Date.now();
    saveState(st);
    localStorage.setItem('azp_timer_global_'+sk(), String(end));
    try{(window.allTasks||[]).forEach(t=>localStorage.setItem('azp_timer_'+sk()+'_'+tk(t), String(end)));}catch(_e){}
    try{if(typeof toast==='function')toast('✅ Admin opened timer now');}catch(_e){}
    try{if(typeof render==='function')render();}catch(_e){}
  }
  function lockState(d){
    const st={
      timerLocked:true,openNow:false,
      dutyDate:d.dutyDate||'',dutyStartTime:d.dutyStartTime||'',dutyEndTime:d.dutyEndTime||'',
      dutyStartMs:Number(d.dutyStartMs||0),dutyEndMs:Number(d.dutyEndMs||0),
      timerEndMs:0,updatedAtMs:Number(d.updatedAtMs||Date.now()),note:d.note||''
    };
    saveState(st);
    try{if(typeof render==='function')render();}catch(_e){}
  }
  function scheduleState(d){
    const now=Date.now();
    const start=Number(d.dutyStartMs||0), end=Number(d.dutyEndMs||0);
    const st={
      timerLocked:true,openNow:false,
      dutyDate:d.dutyDate||'',dutyStartTime:d.dutyStartTime||'',dutyEndTime:d.dutyEndTime||'',
      dutyStartMs:start,dutyEndMs:end,timerEndMs:Number(d.timerEndMs||0),updatedAtMs:Number(d.updatedAtMs||Date.now()),note:d.note||''
    };
    if(start && now>=start && (!end || now<=end)){
      st.timerLocked=false; st.openNow=true; st.timerEndMs=Date.now()+10*60*1000;
      saveState(st);
      openNow(st.timerEndMs);
    }else{
      saveState(st);
      try{if(typeof toast==='function')toast('Duty time saved. Timer locked.');}catch(_e){}
      try{if(typeof render==='function')render();}catch(_e){}
    }
  }
  function applyControl(d){
    if(!isMine(d))return;
    if(d.action==='openDutyTimerNow' || (d.action==='dutyTimerControl' && d.openNow===true) || (d.action==='timerReset' && d.openNow===true)){
      openNow(Number(d.timerEndMs||0));
      return;
    }
    if(d.action==='dutyTimerControl'){
      if(d.timerLocked===true && !Number(d.dutyStartMs||0)){lockState(d);return;}
      scheduleState(d);return;

      openNow(Number(d.timerEndMs||0));

    const globalEnd=Number(localStorage.getItem('azp_timer_global_'+sk())||0);
    if(globalEnd>end)end=globalEnd;
    if(!end||end<Date.now()){
      end=Date.now()+10*60*1000;
      localStorage.setItem(k,String(end));

    return end;

  window.azpResetActiveTimer=function(manual=true){
    if(!window.azpDutyTimerIsOpen()){
      alert('🔒 Timer locked hai. Admin Open Now karega ya duty time par automatic khulega.');

    openNow(Date.now()+10*60*1000);
    if(manual){
      try{window.azpPenalty=Number(window.azpPenalty||0)+3;if(typeof azpSaveScore==='function')azpSaveScore();}catch(_e){}
      try{if(typeof toast==='function')toast('Timer restarted. Score -3');}catch(_e){}

  // Direct listeners for all action names.
  let unsubs=[];

    try{unsubs.forEach(u=>{try{u()}catch(_e){}});unsubs=[];}catch(_e){}
    const raw=nm(), key=sk();
    const ids=['AZP_STAFF_CONTROL_ALL','AZP_STAFF_CONTROL_all','AZP_STAFF_CONTROL_'+key,'AZP_STAFF_CONTROL_'+raw,'AZP_STAFF_CONTROL_'+raw.toLowerCase()];

    const ids=['AZP_STAFF_CONTROL_ALL','AZP_STAFF_CONTROL_all','AZP_STAFF_CONTROL_'+key,'AZP_STAFF_CONTROL_'+raw,'AZP_STAFF_CONTROL_'+raw.toLowerCase()];
    for(const id of [...new Set(ids)]){
      try{const doc=await db.collection('azpExecutionRecords').doc(id).get(); if(doc.exists)applyControl(doc.data()||{});}catch(e){}

  }
  const oldLogin=window.login;
  if(typeof oldLogin==='function'){
    window.login=function(){oldLogin.apply(this,arguments);setTimeout(()=>{start();check();},700);};
  }

  // Better card locked display

    window.card=function(t,i){

      const st=getState();
      const when=st.dutyStartTime?('Duty Start: '+(st.dutyDate||'')+' '+st.dutyStartTime):'Admin Open Now karega ya duty time set karega.';
      const lock='<div class="azp-timer-box locked"><b>🔒 Timer Locked</b><div class="azp-note">'+when+'<br>Timer duty time par automatic open hoga.</div></div>';
      if(html.includes('azp-timer-box')){
        return html.replace(/<div class="azp-timer-box[\s\S]*?<\/button>\s*<\/div>/, lock);
      }
      return html+lock;
    };
  }
})();
</script>
