function azpDisplayCustomerTitle(t,stage){
  let name=String(t.customer_name||t.customerName||'').trim();
  if(!name || name.toLowerCase()==='customer'){
    const route=[t.from||t.fromLocation||'', t.to||t.toLocation||''].filter(Boolean).join(' to ');
    name=route || 'Customer';
  }
  return esc(name+' - '+stage);
}

}

let db=null, me=null, allTasks=[], currentFilter='All'; const $=id=>document.getElementById(id); const STAGES=['New Lead','Item List','Quotation','Advance','Planning','Execution','Balance Payment','Feedback','Review'];
function norm(v){return String(v||'').trim().toLowerCase()} function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))} function today(){return new Date().toISOString().slice(0,10)} function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function init(){try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();$('fbStatus').textContent='Firebase Connected'}catch(e){$('fbStatus').textContent='Firebase Error';console.error(e)} setInterval(()=>{if(me)render()},60000); const saved=localStorage.getItem('azp_staff_login_clean'); if(saved){const s=JSON.parse(saved); $('loginName').value=s.name;$('loginRole').value=s.role;$('loginPhone').value=s.phone||''; login()}}
function login(){const name=$('loginName').value.trim(); if(!name)return toast('Name required'); me={name,role:$('loginRole').value,phone:$('loginPhone').value.replace(/\D/g,'')}; localStorage.setItem('azp_staff_login_clean',JSON.stringify(me)); $('loginBox').classList.add('hidden'); $('dash').classList.remove('hidden'); $('who').textContent=me.name; $('role').textContent=me.role+(me.phone?' • '+me.phone:''); startSync()}

function cleanStatus(s){s=String(s||'Pending'); if(s==='WaitingAdminApproval')return 'Waiting Admin Approval'; return s}
function matches(t){
  const n=norm(me.name), r=norm(me.role), p=me.phone.slice(-10);
  const tn=norm(t.assigned_staff||t.staffName||t.assignedStaff||t.assignedTo||t.assignTo||t.targetStaffName);
  const tr=norm(t.assign_role||t.role);
  const tp=String(t.staff_mobile||t.staffPhone||t.targetStaffPhone||t.phone||'').replace(/\D/g,'').slice(-10);
  return (tn===n)||(tn.includes(n)&&n.length>2)||(n.includes(tn)&&tn.length>2)||(p&&tp&&p===tp)||(tr===r&&!tn)
}
function docToTask(doc){
  const d={_docId:doc.id,...doc.data()};
  if(d.module!=='taskManagement')return null;

  // Accept CRM tasks saved from Task CRM software in both old and new formats.
  const src=String(d.source||'');
  const hasCRMIdentity=!!(d.leadId||d.crmLeadId||d.customer_name||d.customerName||String(d.id||'').startsWith('CRM_TASK_'));
  if(src && !['CRM_SINGLE_LIVE','crm','task_crm','crmLead'].includes(src) && !hasCRMIdentity)return null;
  if(!src && !hasCRMIdentity)return null;

  // Normalize fields so this staff app can display old/new CRM records.
  d.source='CRM_SINGLE_LIVE';
  d.leadId=d.leadId||d.crmLeadId||String(d.id||doc.id).replace(/^CRM_TASK_/,'');
  d.workflow_stage=d.workflow_stage||d.stage||'New Lead';
  d.customer_name=d.customer_name||d.customerName||d.writeTo||'Customer';
  d.customer_mobile=d.customer_mobile||d.customerMobile||d.mobile||'';
  d.from=d.from||d.fromLocation||'';
  d.to=d.to||d.toLocation||'';
  d.assigned_staff=d.assigned_staff||d.staffName||d.assignedStaff||d.assignedTo||d.assignTo||d.targetStaffName||'';
  d.assign_role=d.assign_role||d.role||'';
  d.staff_mobile=d.staff_mobile||d.staffPhone||d.targetStaffPhone||d.phone||'';
  d.due_date=d.due_date||d.dueDate||'';
  d.due_time=d.due_time||d.dueTime||'11:00';
  d.customer_priority=d.customer_priority||d.crmPriority||d.priority||'Warm';

  if(['Approved','Completed','Cancelled'].includes(cleanStatus(d.status)))return null;
  return d
}
function startSync(){if(!db)return; db.collection('azpExecutionRecords').onSnapshot(s=>{const map=new Map(); s.forEach(doc=>{const t=docToTask(doc); if(!t||!matches(t))return; const key=t.leadId||t.id||doc.id; const old=map.get(key); if(!old||(t.updatedAtMs||0)>(old.updatedAtMs||0))map.set(key,t)}); allTasks=[...map.values()].sort((a,b)=>(b.priorityScore||0)-(a.priorityScore||0)||dueMs(a)-dueMs(b)); render()},e=>{console.error(e);toast('Firebase read issue')})}
function dueMs(t){const n=new Date((t.due_date||today())+'T'+(t.due_time||'23:59')).getTime(); return isNaN(n)?9999999999999:n} function isFuture(t){return dueMs(t)>Date.now()+60000} function isScheduledHold(t){return (t.scheduled_hold===true||t.status==='Scheduled')&&isFuture(t)} function isToday(t){return t.due_date===today()}
function nextStage(stage){const i=STAGES.indexOf(stage); return i>=0&&i<STAGES.length-1?STAGES[i+1]:stage}
function nextTaskTitle(t,stage){return `CRM TASK: ${t.customer_name||'Customer'} - ${stage} (${t.customer_priority||'Warm'})`}
function nextComment(t,stage){return `[CRM:${t.leadId}] ${stage} task for ${t.customer_name||'Customer'}. Route: ${t.from||'-'} to ${t.to||'-'}. Mobile: ${t.customer_mobile||'-'}.`}
async function updateTask(t,patch){await db.collection('azpExecutionRecords').doc(t._docId).set({...patch,updatedAtMs:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); try{await db.collection('taskMaster').doc(t.id).set(patch,{merge:true})}catch(e){}}
async function startTask(id){const t=allTasks.find(x=>x._docId===id); if(t)await updateTask(t,{status:'In Progress'}); toast('Started')}

async function updateLead(t,patch){if(!t.leadId)return; await db.collection('azpExecutionRecords').doc('CRM_LEAD_'+t.leadId).set({...patch,updatedAtMs:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})}
async function itemReceived(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const ns='Quotation'; const patch={workflow_stage:ns,status:'Pending',scheduled_hold:false,task_title:nextTaskTitle(t,ns),title:nextTaskTitle(t,ns),comments:nextComment(t,ns)+' Item list received.',comment:nextComment(t,ns)+' Item list received.',due_date:today(),due_time:'11:00',priority:t.customer_priority==='Hot'?'Very Urgent':'Urgent'}; await updateTask(t,patch); await updateLead(t,{stage:ns,dueDate:today(),dueTime:'11:00',followupHold:false}); toast('Item received. Quotation task created')}
async function itemLater(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const d=prompt('Item List follow-up date YYYY-MM-DD', today()); if(!d)return; const tm=prompt('Item List follow-up time HH:MM','11:00'); if(!tm)return; const reason=prompt('Reason','Customer will send item list later')||''; const future=new Date(d+'T'+tm).getTime()>Date.now()+60000; const patch={workflow_stage:'Item List',status:future?'Scheduled':'Pending',scheduled_hold:future,task_title:nextTaskTitle(t,'Item List'),title:nextTaskTitle(t,'Item List'),comments:nextComment(t,'Item List')+' Reason: '+reason,comment:nextComment(t,'Item List')+' Reason: '+reason,due_date:d,due_time:tm,priority:future?'Scheduled':(t.customer_priority==='Hot'?'Very Urgent':'Urgent')}; await updateTask(t,patch); await updateLead(t,{stage:'Item List',dueDate:d,dueTime:tm,remarks:reason,followupHold:future,followReason:reason}); toast(future?'Item List task scheduled. Due time par show hoga.':'Item List follow-up due now')}
async function confirmTask(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; await updateTask(t,{workflow_stage:'Confirmed',status:'Pending',task_title:nextTaskTitle(t,'Confirmed'),comments:nextComment(t,'Confirmed'),due_date:today(),due_time:'11:00'}); await updateLead(t,{stage:'Confirmed',status:'Active'}); toast('Confirmed')}
async function cancelTask(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const reason=prompt('Cancel reason?')||'Cancelled by customer'; await updateTask(t,{status:'Cancelled',workflow_stage:'Cancelled',comments:'Cancelled: '+reason}); await updateLead(t,{stage:'Cancelled',status:'Cancelled',remarks:reason}); toast('Cancelled - no next task')}
async function laterTask(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const d=prompt('Follow-up date YYYY-MM-DD', today()); if(!d)return; const tm=prompt('Follow-up time HH:MM','11:00'); if(!tm)return; const reason=prompt('Reason','Customer asked to call later')||''; const future=new Date(d+'T'+tm).getTime()>Date.now()+60000; await updateTask(t,{workflow_stage:'Follow-up',status:future?'Scheduled':'Pending',scheduled_hold:future,task_title:nextTaskTitle(t,'Follow-up'),comments:nextComment(t,'Follow-up')+' Reason: '+reason,due_date:d,due_time:tm,priority:future?'Scheduled':(t.customer_priority==='Hot'?'Very Urgent':'Urgent')}); await updateLead(t,{stage:'Follow-up',dueDate:d,dueTime:tm,remarks:reason,followupHold:future,followReason:reason}); toast(future?'Follow-up scheduled. Task due time par show hoga.':'Follow-up due now')}
function copyMsg(t){navigator.clipboard.writeText(`A TO Z Task\nCustomer: ${t.customer_name||'-'}\nMobile: ${t.customer_mobile||'-'}\nStage: ${t.workflow_stage||'-'}\nFrom-To: ${t.from||'-'} to ${t.to||'-'}\nDue: ${t.due_date||'-'} ${t.due_time||''}`); toast('Copied')}
function wa(t){let p=String(t.customer_mobile||'').replace(/\D/g,''); if(p.length===10)p='91'+p; if(!p)return toast('Customer mobile missing'); window.open(`https://wa.me/${p}`,'_blank')}
function renderFilters(){const arr=['All','Pending','In Progress','Today','Scheduled']; $('filters').innerHTML=arr.map(f=>`<button class="filter ${currentFilter===f?'active':''}" onclick="currentFilter='${f}';render()">${f}</button>`).join('')}
function filterTask(t){const st=cleanStatus(t.status); if(isScheduledHold(t)) return currentFilter==='Scheduled'; if(currentFilter==='All')return true; if(currentFilter==='Today')return isToday(t); if(currentFilter==='Scheduled')return false; return st===currentFilter}
function render(){renderFilters(); const q=norm($('search').value); const visibleBase=allTasks.filter(t=>!isScheduledHold(t)); let list=allTasks.filter(t=>filterTask(t)).filter(t=>!q||[t.task_title,t.customer_name,t.customer_mobile,t.from,t.to,t.comments].join(' ').toLowerCase().includes(q)); $('total').textContent=visibleBase.length; $('pending').textContent=visibleBase.filter(t=>cleanStatus(t.status)==='Pending').length; $('todayCnt').textContent=visibleBase.filter(isToday).length; $('taskList').innerHTML=list.length?list.map(card).join(''):'<div class="empty">No task found for your login.</div>'}

 const m={

/* ===== AZP PERMANENT WORKFLOW STAGE UPDATE FIX - SAME CARD NEXT STAGE =====
   Fixes: Complete & Next toast appears but task remains same.
   Method: update BOTH CRM lead document and task document using every possible ID,
   then update local card immediately before Firestore snapshot returns.
*/
function azpTaskLeadId(t){
  if(!t) return '';
  let lid = String(t.leadId || t.lead_id || t.crmLeadId || '').trim();
  if(!lid && t.id) lid = String(t.id).replace(/^TASK_/,'').trim();
  if(!lid && t._docId) lid = String(t._docId).replace(/^CRM_TASK_/,'').replace(/^TASK_/,'').trim();
  if(!lid){
    const m = String(t.comments || t.comment || '').match(/\[CRM:([^\]]+)\]/i);
    if(m) lid = m[1].trim();
  }
  return lid;
}
function azpTaskDocIds(t){
  const ids = new Set();
  const lid = azpTaskLeadId(t);
  if(t && t._docId) ids.add(String(t._docId));
  if(t && t.id) ids.add(String(t.id));
  if(lid){ ids.add('CRM_TASK_'+lid); ids.add('TASK_'+lid); }
  return [...ids].filter(Boolean);
}
function azpLeadDocIds(t){
  const lid = azpTaskLeadId(t);
  const ids = new Set();
  if(lid){ ids.add('CRM_LEAD_'+lid); ids.add(lid); }
  return [...ids].filter(Boolean);
}
function azpBuildPatch(t, stage){
  const lid = azpTaskLeadId(t);
  const title = nextTaskTitle(t, stage);
  const comment = nextComment(t, stage);
  return {
    leadId: lid,
    workflow_stage: stage,
    stage: stage,
    status: 'Pending',
    staff_app_status: 'Pending',
    task_status: 'Pending',
    admin_approval: '',
    scheduled_hold: false,
    followupHold: false,
    task_title: title,
    title: title,
    comments: comment,
    comment: comment,
    due_date: today(),
    dueDate: today(),
    due_time: '11:00',
    dueTime: '11:00',
    priority: (t.customer_priority === 'Hot' ? 'Very Urgent' : 'Urgent'),
    updatedAtMs: Date.now(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
}
async function azpSaveStageEverywhere(t, stage){
  if(!db || !t) throw new Error('Firebase/task missing');
  const lid = azpTaskLeadId(t);
  const taskPatch = azpBuildPatch(t, stage);
  const leadPatch = {
    id: lid,
    stage: stage,
    workflow_stage: stage,
    status: 'Active',
    dueDate: today(),
    due_date: today(),
    dueTime: '11:00',
    due_time: '11:00',
    followupHold: false,
    scheduled_hold: false,
    updatedAtMs: Date.now(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  const writes = [];
  azpTaskDocIds(t).forEach(id => writes.push(db.collection('azpExecutionRecords').doc(id).set(taskPatch,{merge:true})));
  azpLeadDocIds(t).forEach(id => writes.push(db.collection('azpExecutionRecords').doc(id).set(leadPatch,{merge:true})));
  if(lid) writes.push(db.collection('taskMaster').doc('TASK_'+lid).set(taskPatch,{merge:true}).catch(()=>{}));
  await Promise.all(writes);
  // Immediate local update so user sees change without waiting for network snapshot
  Object.assign(t, taskPatch);
  const idx = allTasks.findIndex(x => x._docId === t._docId || azpTaskLeadId(x) === lid);
  if(idx >= 0) Object.assign(allTasks[idx], taskPatch);
  render();
}

function azpSafeLeadId(t){
  let lid = String((t && (t.leadId || t.lead_id || t.customerId || t.crmId)) || '').trim();
  if(!lid && t){
    const txt = [t.comments,t.comment,t.task_title,t.title,t.id,t._docId].join(' ');
    const m = txt.match(/(?:CRM:|AZL)([A-Za-z0-9_-]+)/i);
    if(m) lid = (m[0].startsWith('CRM:')?m[1]:'AZL'+m[1]).replace(/\]/g,'');
  }
  return lid;
}
function azpStageKey(t){ return 'azp_stage_override_'+azpSafeLeadId(t); }

  try{

    const o=JSON.parse(raw); if(!o||!o.stage)return '';
    // keep override for 24 hours; prevents old Firebase snapshot from reverting the card during testing
    if(Date.now()-(o.ts||0)>86400000){ localStorage.removeItem(azpStageKey(t)); return ''; }

  }catch(e){return ''}
}

async function azpWriteSafeStage(t,stage){

/* ===== AZP STAGE-SPECIFIC FOLLOW-UP + SLA SCHEDULE PATCH ===== */
function azpPad(n){return String(n).padStart(2,'0')}
function azpDateObj(dateStr,timeStr){
  const d = new Date((dateStr||today())+'T'+(timeStr||'11:00'));
  return isNaN(d.getTime()) ? new Date() : d;
}
function azpAddDays(dateStr,days){
  const d = new Date((dateStr||today())+'T00:00');
  d.setDate(d.getDate()+Number(days||0));
  return d.toISOString().slice(0,10);
}
function azpTimePlusMinutes(mins){
  const d=new Date(Date.now()+Number(mins||15)*60000);
  return azpPad(d.getHours())+':'+azpPad(d.getMinutes());
}
function azpIsFutureDT(d,t){ return azpDateObj(d,t).getTime() > Date.now()+60000; }
function azpStageSlaMinutes(stage){
  const s=String(stage||'');
  if(s==='Vendor Arrangement') return 24*60;
  if(s==='WhatsApp Job Allotment') return 60;
  return 0;
}
function azpIsOverdueStage(t){
  const due=azpDateObj(t.due_date||t.dueDate,t.due_time||t.dueTime).getTime();
  return due < Date.now()-60000;
}
function azpDefaultNextDue(t,stage){
  const baseDate=t.due_date||t.dueDate||today();
  const baseTime=t.due_time||t.dueTime||'11:00';
  if(stage==='Vendor Follow-up') return {date:baseDate,time:baseTime};
  if(stage==='Item Video + Bill + 90% Payment') return {date:azpAddDays(baseDate,1),time:'11:00'};
  if(stage==='Online Review') return {date:baseDate,time:baseTime};
  if(stage==='Physical Feedback') return {date:azpAddDays(baseDate,2),time:'11:00'};
  if(stage==='Reference Follow-up') return {date:azpAddDays(baseDate,3),time:'11:00'};
  return {date:today(),time:'11:00'};
}
function azpBuildScheduledPatch(t,stage,date,time,reason){
  const lid=azpSafeLeadId(t);
  const future=azpIsFutureDT(date,time);
  const title=(t.customer_name||'Customer')+' - '+stage;
  const guide=taskGuideEnglish(stage);
  const comment='[CRM:'+lid+'] '+guide+' Route: '+(t.from||'-')+' to '+(t.to||'-')+'. Mobile: '+(t.customer_mobile||'-')+'. '+(reason?('Note: '+reason):'');
  return {
    module:'taskManagement',collection:'taskManagement',source:'CRM_SINGLE_LIVE',
    leadId:lid,workflow_stage:stage,stage:stage,
    status:future?'Scheduled':'Pending',staff_app_status:future?'Scheduled':'Pending',task_status:future?'Scheduled':'Pending',admin_approval:'',
    scheduled_hold:future,followupHold:future,followReason:reason||'',
    task_title:title,title:title,comments:comment,comment:comment,
    due_date:date,dueDate:date,due_time:time,dueTime:time,
    priority:future?'Scheduled':(t.customer_priority==='Hot'?'Very Urgent':'Urgent'),
    updatedAtMs:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };
}
async function azpWriteStageWithDue(t,stage,date,time,reason){
  const lid=azpSafeLeadId(t); if(!lid) throw new Error('Lead ID missing');
  const patch=azpBuildScheduledPatch(t,stage,date,time,reason||'');
  // Keep local override only for visible/non-future task. Future tasks should hide until due.
  if(!patch.scheduled_hold) azpSetLocalStage(t,stage);
  Object.assign(t,patch);
  allTasks = allTasks.map(x => (azpSafeLeadId(x)===lid ? Object.assign(x,patch) : x));
  render();
  const leadPatch={id:lid,module:'crmLead',stage:stage,workflow_stage:stage,status:'Active',dueDate:date,dueTime:time,due_date:date,due_time:time,followupHold:patch.scheduled_hold,scheduled_hold:patch.scheduled_hold,followReason:reason||'',remarks:reason||'',updatedAtMs:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
  const writes=[];
  if(t._docId) writes.push(db.collection('azpExecutionRecords').doc(String(t._docId)).set(patch,{merge:true}));
  writes.push(db.collection('azpExecutionRecords').doc('CRM_TASK_'+lid).set(patch,{merge:true}));
  writes.push(db.collection('azpExecutionRecords').doc('CRM_LEAD_'+lid).set(leadPatch,{merge:true}));
  try{writes.push(db.collection('taskMaster').doc('TASK_'+lid).set(patch,{merge:true}));}catch(e){}
  await Promise.all(writes);
}

// Follow Up Next rules requested by Manoj ji.
async function followNextStage(id,mode){
  try{
    const t=allTasks.find(x=>x._docId===id || x.id===id || azpSafeLeadId(x)===id);
    if(!t){toast('Record not found');return;}
    const stage=t.workflow_stage||t.stage||'New Lead';
    let d=today(), tm='11:00', label='Follow-up';
    if(mode==='timeOnly15'){
      label='Job allotment follow-up';
      tm=prompt('Next follow-up time HH:MM (15 minutes gap recommended)', azpTimePlusMinutes(15));
      if(!tm)return;
      d=today();
      if(!/^\d{2}:\d{2}$/.test(tm)){toast('Enter valid time like 11:15');return;}
    }else{
      label=stage+' follow-up';
      d=prompt(label+' date YYYY-MM-DD', t.due_date||t.dueDate||today());
      if(!d)return;
      tm=prompt(label+' time HH:MM', t.due_time||t.dueTime||'11:00');
      if(!tm)return;
    }
    let reason=prompt('Remark / reason', label)||'';
    await azpWriteStageWithDue(t,stage,d,tm,reason);
    const future=azpIsFutureDT(d,tm);
    toast(future ? 'Follow-up scheduled. It will show at selected time.' : 'Follow-up due now.');
  }catch(e){console.error(e);toast('Follow-up schedule failed: '+(e.message||e));}
}

/* ===== AZP FINAL NO-HIDE WORKFLOW PATCH v5 - REAL FIX =====
   Root fix: old docToTask filtered Completed/Approved before local stage override.
   This made the card disappear after Complete & Next on some devices/snapshots.
   New rule: CRM_SINGLE_LIVE task is never hidden after Complete & Next; same task stays Pending and moves stage.
*/
function azpFindTaskByAnyId(id){
  return allTasks.find(x => x._docId===id || x.id===id || x.leadId===id || azpSafeLeadId(x)===id) || null;
}
function azpRawDocToTask(doc){
  const d={_docId:doc.id,...doc.data()};
  if(d.module!=='taskManagement') return null;
  if(d.source!=='CRM_SINGLE_LIVE') return null;
  const st=cleanStatus(d.status);
  if(st==='Cancelled') return null;
  // Important: Do NOT hide Completed/Approved snapshots for CRM workflow.
  // The workflow card must remain visible and move to next stage.
  if(st==='Completed' || st==='Approved' || d.task_status==='Completed' || d.staff_app_status==='Completed'){
    d.status='Pending'; d.task_status='Pending'; d.staff_app_status='Pending';
  }
  const localStage = azpGetLocalStage ? azpGetLocalStage(d) : '';
  if(localStage){ d.workflow_stage=localStage; d.stage=localStage; d.status='Pending'; d.task_status='Pending'; d.staff_app_status='Pending'; d.scheduled_hold=false; }
  return d;
}
docToTask = azpRawDocToTask;
startSync = function(){
  if(!db) return;
  db.collection('azpExecutionRecords').onSnapshot(s=>{
    const map=new Map();
    s.forEach(doc=>{
      const t=docToTask(doc);
      if(!t || !matches(t)) return;
      const key=azpSafeLeadId(t) || t.leadId || t.id || doc.id;
      const old=map.get(key);
      const localStage = azpGetLocalStage ? azpGetLocalStage(t) : '';
      const scoreNew=(localStage?9999999999999:0)+(t.updatedAtMs||0);
      const scoreOld=old?((azpGetLocalStage && azpGetLocalStage(old)?9999999999999:0)+(old.updatedAtMs||0)):0;
      if(!old || scoreNew>=scoreOld) map.set(key,t);
    });

async function azpSafeSetDocV6(collection, docId, data){
  try{ await db.collection(collection).doc(docId).set(data,{merge:true}); return true; }
  catch(e){
    const msg=String(e&&e.message||e||'');

updateTask = async function(t,patch){
  if(!t) return false;
  const docId=t._docId || (t.leadId?'CRM_TASK_'+t.leadId:(t.id||''));
  if(!docId){ toast('Task ID missing'); return false; }
  const payload={...patch, updatedAtMs:Date.now(), updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
  try{
    await db.collection('azpExecutionRecords').doc(docId).set(payload,{merge:true});
    Object.assign(t,payload,{_docId:docId});
    try{ if(t.id) await db.collection('taskMaster').doc(t.id).set(payload,{merge:true}); }catch(e){console.warn('taskMaster mirror skipped',e)}
    return true;
  }catch(e){
    const msg=String(e&&e.message||e||'');
    console.error('Main task update failed',msg);
    // Keep UI stable even if permission rule blocks write; user can still see the next stage locally.
    Object.assign(t,payload,{_docId:docId}); render();
    toast('Task updated locally. Firebase rule needs permission check.');
    return false;
  }

function azpPatchForStageV6(t,ns,extra={}){

  if(ns==='Item Video + Bill + 90% Payment' && (t.uniformFollowDate || t.uniformDate)){ d=t.uniformFollowDate||t.uniformDate; tm=t.uniformFollowTime||t.uniformTime||tm; }
  if(ns==='Online Review' && (t.tenPercentDate || t.tenPaymentDate)){ d=t.tenPercentDate||t.tenPaymentDate; tm=t.tenPercentTime||t.tenPaymentTime||tm; }
  if(ns==='Physical Feedback' && (t.tenPercentDate || t.tenPaymentDate)){ d=azpPlusDaysV6(t.tenPercentDate||t.tenPaymentDate,2); tm=t.tenPercentTime||t.tenPaymentTime||tm; }
  if(ns==='Reference Follow-up'){

/* ===== AZP PERMANENT LINEAR WORKFLOW FIX - NO BACKWARD / NO LOOP / NO HALT =====
   Problem fixed:
   White Board Entry was returning to Agreement Paper / repeated stages / halted after 2-3 steps.
   Rule: One fixed forward-only workflow. Complete & Next always moves to the next stage.
*/
(function(){
  const AZP_FINAL_FLOW=[
    'New Lead',
    'Item List',
    'Quotation',
    'Advance',
    'Planning',
    'Confirmation Message',
    'Agreement Paper',
    'White Board Entry',
    'Vendor Arrangement',
    'Driver Call',
    'WhatsApp Job Allotment',
    'Uniform Verification',
    'Vendor Follow-up',
    'Item Video + Bill + 90% Payment',
    '10% Payment',
    'Online Review',
    'Physical Feedback',
    'Reference Follow-up',
    'Review'
  ];

  const STAGE_ALIAS={
    'Confirmed':'Planning',
    'Confirmation':'Confirmation Message',
    'Agreement':'Agreement Paper',
    'Whiteboard Entry':'White Board Entry',
    'Whiteboard':'White Board Entry',
    'White Board':'White Board Entry',
    'Vendor':'Vendor Arrangement',
    'Driver':'Driver Call',
    'Job Allotment':'WhatsApp Job Allotment',
    'Whatsapp Job Allotment':'WhatsApp Job Allotment',
    'Uniform':'Uniform Verification',
    'Vendor Followup':'Vendor Follow-up',
    'Item Video Bill Payment':'Item Video + Bill + 90% Payment',
    '90% Payment':'Item Video + Bill + 90% Payment',
    'Balance Payment':'10% Payment',
    'Final Payment':'10% Payment',
    'Feedback':'Physical Feedback'
  };

  function normStage(s){
    s=String(s||'New Lead').trim();
    return STAGE_ALIAS[s] || s;
  }

  window.azpNextStageSafe=function(stage){
    stage=normStage(stage);
    const i=AZP_FINAL_FLOW.indexOf(stage);
    if(i>=0 && i<AZP_FINAL_FLOW.length-1) return AZP_FINAL_FLOW[i+1];
    if(i===AZP_FINAL_FLOW.length-1) return 'Review';
    return 'New Lead';
  };

  window.nextStage=function(stage){
    return window.azpNextStageSafe(stage);
  };

  function safeId(t){
    return String((t&&t.leadId)||(t&&t.crmLeadId)||(t&&t.id)||'').replace(/^CRM_TASK_/,'').replace(/^TASK_/,'');
  }

  function getCustomer(t){
    let name=String((t&&t.customer_name)||(t&&t.customerName)||(t&&t.writeTo)||'Customer').trim();
    if(!name || /CRM TASK|\[CRM|Mobile:|Route:/i.test(name)) name='Customer';
    return name;
  }

  function cleanStagePatch(t,stage){
    stage=normStage(stage);
    const dueDate=(t&& (t.due_date||t.dueDate)) || (typeof today==='function'?today():new Date().toISOString().slice(0,10));
    const dueTime=(t&& (t.due_time||t.dueTime)) || '11:00';
    const title=getCustomer(t)+' - '+stage;
    const en=(typeof taskGuideEnglish==='function')?taskGuideEnglish(stage):('Complete '+stage+' task.');
    return {
      workflow_stage:stage,
      stage:stage,
      status:'Pending',
      staff_app_status:'Pending',
      task_status:'Pending',
      scheduled_hold:false,
      followupHold:false,
      task_title:title,
      title:title,
      comments:en,
      comment:en,
      due_date:dueDate,
      dueDate:dueDate,
      due_time:dueTime,
      dueTime:dueTime,
      priority:((t&&t.customer_priority)==='Hot'?'Very Urgent':'Urgent'),
      updatedAtMs:Date.now(),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    };
  }

  window.azpWriteSafeStage=async function(t,stage){
    if(!t) throw new Error('Task missing');
    const patch=cleanStagePatch(t,stage);
    const lid=safeId(t);
    Object.assign(t,patch);
    try{ if(typeof azpSetLocalStage==='function') azpSetLocalStage(t,patch.workflow_stage); }catch(e){}
    try{
      allTasks=allTasks.map(function(x){
        const xl=safeId(x);
        return (x._docId===t._docId || (lid && xl===lid)) ? Object.assign(x,patch) : x;
      });
      render();
    }catch(e){}
    if(!db) return;
    const writes=[];
    if(t._docId) writes.push(db.collection('azpExecutionRecords').doc(String(t._docId)).set(patch,{merge:true}));
    if(lid) writes.push(db.collection('azpExecutionRecords').doc('CRM_TASK_'+lid).set({...patch,module:'taskManagement',source:'CRM_SINGLE_LIVE',leadId:lid},{merge:true}));
    if(lid) writes.push(db.collection('azpExecutionRecords').doc('TASK_'+lid).set({...patch,module:'taskManagement',source:'CRM_SINGLE_LIVE',leadId:lid},{merge:true}));
    if(lid) writes.push(db.collection('azpExecutionRecords').doc('CRM_LEAD_'+lid).set({
      stage:patch.workflow_stage,
      workflow_stage:patch.workflow_stage,
      status:'Active',
      dueDate:patch.dueDate,
      dueTime:patch.dueTime,
      due_date:patch.due_date,
      due_time:patch.due_time,
      followupHold:false,
      scheduled_hold:false,
      updatedAtMs:Date.now(),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true}));
    try{ if(lid) writes.push(db.collection('taskMaster').doc('TASK_'+lid).set({...patch,module:'taskManagement',source:'CRM_SINGLE_LIVE',leadId:lid},{merge:true})); }catch(e){}
    await Promise.all(writes);
  };

  window.completeNext=async function(id){
    try{
      const t=(allTasks||[]).find(function(x){
        return x._docId===id || x.id===id || x.leadId===id || safeId(x)===id;
      });
      if(!t){ toast('Record not found. Please refresh once.'); return; }
      const current=normStage(t.workflow_stage||t.stage||'New Lead');

      // Decision stages keep their special buttons.
      if(current==='Item List'){ toast('Choose Item Received / Item Later / Cancel'); return; }
      if(current==='Advance'){ toast('Choose Advance Received / Advance Later / Cancel'); return; }

      const ns=window.azpNextStageSafe(current);
      if(ns===current && current==='Review'){
        toast('Workflow completed');
        return;
      }
      await window.azpWriteSafeStage(t,ns);
      toast('Moved to '+ns);
    }catch(e){
      console.error(e);
      toast('Stage update failed: '+(e.message||e));
    }
  };

  window.itemReceived=async function(id){
    try{
      const t=(allTasks||[]).find(x=>x._docId===id || x.id===id || x.leadId===id || safeId(x)===id);
      if(!t){ toast('Record not found'); return; }
      await window.azpWriteSafeStage(t,'Quotation');
      toast('Moved to Quotation');
    }catch(e){ console.error(e); toast('Item update failed'); }
  };

  window.advanceReceived=async function(id){
    try{
      const t=(allTasks||[]).find(x=>x._docId===id || x.id===id || x.leadId===id || safeId(x)===id);
      if(!t){ toast('Record not found'); return; }
      await window.azpWriteSafeStage(t,'Planning');
      toast('Moved to Planning');
    }catch(e){ console.error(e); toast('Advance update failed'); }
  };

  // Remove stale local stage overrides older than 5 minutes to prevent old loop-back testing data.
  try{
    Object.keys(localStorage).forEach(function(k){
      if(k.indexOf('azp_stage_override_')===0){
        const o=JSON.parse(localStorage.getItem(k)||'{}');
        if(!o.ts || Date.now()-o.ts>5*60*1000) localStorage.removeItem(k);
      }
    });
  }catch(e){}
})();


/* ===== AZP FOLLOW UP NEXT BUTTON RECOVERY FINAL =====
   Restores Follow Up Next button on required workflow stages:
   Vendor Arrangement, WhatsApp Job Allotment, Uniform Verification, 10% Payment.
   Staff can set date/time, task becomes Scheduled and shows again at due time.
*/
(function(){
  function azpTodayISO(){ return (typeof today==='function') ? today() : new Date().toISOString().slice(0,10); }
  function pad(n){ return String(n).padStart(2,'0'); }
  function plus15Time(){
    const d=new Date(Date.now()+15*60000);
    return pad(d.getHours())+':'+pad(d.getMinutes());
  }
  function safeLeadId(t){
    return String((t&&t.leadId)||(t&&t.crmLeadId)||(t&&t.id)||'').replace(/^CRM_TASK_/,'').replace(/^TASK_/,'');
  }
  function cleanCustomer(t){
    let name=String((t&&t.customer_name)||(t&&t.customerName)||(t&&t.writeTo)||'Customer').trim();
    if(!name || /CRM TASK|\[CRM|Mobile:|Route:/i.test(name)) name='Customer';
    return name;
  }
  function stageGuide(stage){
    return (typeof taskGuideEnglish==='function') ? taskGuideEnglish(stage) : ('Follow up for '+stage);
  }
  function isFuture(date,time){
    const ms=new Date(String(date||azpTodayISO())+'T'+String(time||'11:00')).getTime();
    return !isNaN(ms) && ms > Date.now()+60000;
  }

  window.followNextStage=async function(id,mode){
    try{
      const t=(allTasks||[]).find(function(x){
        return x._docId===id || x.id===id || x.leadId===id || safeLeadId(x)===id;
      });
      if(!t){ toast('Record not found'); return; }

      const stage=t.workflow_stage||t.stage||'New Lead';
      let d=t.due_date||t.dueDate||azpTodayISO();
      let tm=t.due_time||t.dueTime||'11:00';

      if(mode==='timeOnly15'){
        d=azpTodayISO();
        tm=prompt('Next follow-up time HH:MM', plus15Time());
        if(!tm) return;
        if(!/^([01]\d|2[0-3]):[0-5]\d$/.test(tm)){ toast('Time format HH:MM डालिए'); return; }
      }else{
        d=prompt('Follow-up date YYYY-MM-DD', d);
        if(!d) return;
        tm=prompt('Follow-up time HH:MM', tm);
        if(!tm) return;
        if(!/^\d{4}-\d{2}-\d{2}$/.test(d)){ toast('Date format YYYY-MM-DD डालिए'); return; }
        if(!/^([01]\d|2[0-3]):[0-5]\d$/.test(tm)){ toast('Time format HH:MM डालिए'); return; }
      }

      const reason=prompt('Remark / reason','Follow-up later') || '';
      const future=isFuture(d,tm);
      const lid=safeLeadId(t);
      const title=cleanCustomer(t)+' - '+stage;
      const patch={
        workflow_stage:stage,
        stage:stage,
        status:future?'Scheduled':'Pending',
        staff_app_status:future?'Scheduled':'Pending',
        task_status:future?'Scheduled':'Pending',
        scheduled_hold:future,
        followupHold:future,
        followReason:reason,
        task_title:title,
        title:title,
        comments:stageGuide(stage),
        comment:stageGuide(stage),
        due_date:d,
        dueDate:d,
        due_time:tm,
        dueTime:tm,
        priority:future?'Scheduled':((t.customer_priority==='Hot')?'Very Urgent':'Urgent'),
        updatedAtMs:Date.now(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      };

      Object.assign(t,patch);
      try{
        allTasks=allTasks.map(function(x){
          return (x._docId===t._docId || (lid && safeLeadId(x)===lid)) ? Object.assign(x,patch) : x;
        });
        render();
      }catch(e){}

      if(db){
        const writes=[];
        if(t._docId) writes.push(db.collection('azpExecutionRecords').doc(String(t._docId)).set(patch,{merge:true}));
        if(lid) writes.push(db.collection('azpExecutionRecords').doc('CRM_TASK_'+lid).set({...patch,module:'taskManagement',source:'CRM_SINGLE_LIVE',leadId:lid},{merge:true}));
        if(lid) writes.push(db.collection('azpExecutionRecords').doc('TASK_'+lid).set({...patch,module:'taskManagement',source:'CRM_SINGLE_LIVE',leadId:lid},{merge:true}));
        if(lid) writes.push(db.collection('azpExecutionRecords').doc('CRM_LEAD_'+lid).set({
          stage:stage,
          workflow_stage:stage,
          dueDate:d,
          dueTime:tm,
          due_date:d,
          due_time:tm,
          followupHold:future,
          scheduled_hold:future,
          remarks:reason,
          followReason:reason,
          updatedAtMs:Date.now(),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        },{merge:true}));
        try{ if(lid) writes.push(db.collection('taskMaster').doc('TASK_'+lid).set({...patch,module:'taskManagement',source:'CRM_SINGLE_LIVE',leadId:lid},{merge:true})); }catch(e){}
        await Promise.all(writes);
      }

      toast(future ? 'Follow-up scheduled. Due time पर show होगा.' : 'Follow-up due now.');
    }catch(e){
      console.error(e);
      toast('Follow-up failed: '+(e.message||e));
    }
  };

  // Add decision panel back into the final card rendering without disturbing clean layout.
  const previousCard=window.card;
  window.card=function(t){
    let html=previousCard(t);
    try{
      const stage=t.workflow_stage||t.stage||'New Lead';
      let panel='';
      if(stage==='Vendor Arrangement'){
        panel=`<div class="decision"><b>Vendor / Electrician Follow Up</b><div class="actions"><button class="btn amber" onclick="followNextStage('${t._docId}','dateTime')">Follow Up Next</button></div><div class="small">Date + time set करें. Task selected time पर फिर show होगा.</div></div>`;
      }else if(stage==='WhatsApp Job Allotment'){
        panel=`<div class="decision"><b>Job Allotment Follow Up</b><div class="actions"><button class="btn amber" onclick="followNextStage('${t._docId}','timeOnly15')">Follow Up Next</button></div><div class="small">केवल time set करें. 15 minutes gap follow-up के लिए.</div></div>`;
      }else if(stage==='Uniform Verification'){
        panel=`<div class="decision"><b>Uniform Verification Follow Up</b><div class="actions"><button class="btn amber" onclick="followNextStage('${t._docId}','dateTime')">Follow Up Next</button></div><div class="small">Date + time set करें. Same stage scheduled रहेगा.</div></div>`;
      }else if(stage==='10% Payment'){
        panel=`<div class="decision"><b>10% Payment Follow Up</b><div class="actions"><button class="btn amber" onclick="followNextStage('${t._docId}','dateTime')">Follow Up Next</button></div><div class="small">Date + time set करें. Online review से पहले payment follow-up.</div></div>`;
      }
      if(panel){
        html=html.replace('<div class="actions"><button class="btn amber" onclick="startTask', panel+'<div class="actions"><button class="btn amber" onclick="startTask');
      }
    }catch(e){}
    return html;
  };
})();


/* ===== AZP FEEDBACK -> REFERENCE FOLLOW-UP DATE/TIME FINAL =====
   After Physical Feedback, staff must set Reference Follow-up date/time
   for 2/3/4 days later or any selected date/time.
*/
(function(){
  function todayISO(){ return (typeof today==='function') ? today() : new Date().toISOString().slice(0,10); }
  function addDaysISO(days){
    const d=new Date(todayISO()+'T00:00');
    d.setDate(d.getDate()+Number(days||0));
    return d.toISOString().slice(0,10);
  }
  function safeLeadId(t){
    return String((t&&t.leadId)||(t&&t.crmLeadId)||(t&&t.id)||'').replace(/^CRM_TASK_/,'').replace(/^TASK_/,'');
  }
  function customerName(t){
    let n=String((t&&t.customer_name)||(t&&t.customerName)||(t&&t.writeTo)||'Customer').trim();
    if(!n || /CRM TASK|\[CRM|Mobile:|Route:/i.test(n)) n='Customer';
    return n;
  }
  function refGuide(){
    return 'Call customer for reference leads and repeat business.';
  }

  window.feedbackReceivedSetReference=async function(id){
    try{
      const t=(allTasks||[]).find(function(x){
        return x._docId===id || x.id===id || x.leadId===id || safeLeadId(x)===id;
      });
      if(!t){ toast('Record not found'); return; }

      let days=prompt('Reference follow-up कितने दिन बाद? 2 / 3 / 4', '3');
      if(!days) return;
      days=String(days).replace(/\D/g,'') || '3';

      let d=prompt('Reference follow-up date YYYY-MM-DD', addDaysISO(days));
      if(!d) return;
      if(!/^\d{4}-\d{2}-\d{2}$/.test(d)){ toast('Date format YYYY-MM-DD डालिए'); return; }

      let tm=prompt('Reference follow-up time HH:MM', '11:00');
      if(!tm) return;
      if(!/^([01]\d|2[0-3]):[0-5]\d$/.test(tm)){ toast('Time format HH:MM डालिए'); return; }

      const lid=safeLeadId(t);
      const stage='Reference Follow-up';
      const future=new Date(d+'T'+tm).getTime() > Date.now()+60000;
      const patch={
        workflow_stage:stage,
        stage:stage,
        status:future?'Scheduled':'Pending',
        staff_app_status:future?'Scheduled':'Pending',
        task_status:future?'Scheduled':'Pending',
        scheduled_hold:future,
        followupHold:future,
        followReason:'Reference follow-up after feedback',
        task_title:customerName(t)+' - '+stage,
        title:customerName(t)+' - '+stage,
        comments:refGuide(),
        comment:refGuide(),
        due_date:d,
        dueDate:d,
        due_time:tm,
        dueTime:tm,
        priority:future?'Scheduled':((t.customer_priority==='Hot')?'Very Urgent':'Urgent'),
        updatedAtMs:Date.now(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      };

      Object.assign(t,patch);
      try{
        allTasks=allTasks.map(function(x){
          return (x._docId===t._docId || (lid && safeLeadId(x)===lid)) ? Object.assign(x,patch) : x;
        });
        render();
      }catch(e){}

      if(db){
        const writes=[];
        if(t._docId) writes.push(db.collection('azpExecutionRecords').doc(String(t._docId)).set(patch,{merge:true}));
        if(lid) writes.push(db.collection('azpExecutionRecords').doc('CRM_TASK_'+lid).set({...patch,module:'taskManagement',source:'CRM_SINGLE_LIVE',leadId:lid},{merge:true}));
        if(lid) writes.push(db.collection('azpExecutionRecords').doc('TASK_'+lid).set({...patch,module:'taskManagement',source:'CRM_SINGLE_LIVE',leadId:lid},{merge:true}));
        if(lid) writes.push(db.collection('azpExecutionRecords').doc('CRM_LEAD_'+lid).set({
          stage:stage,
          workflow_stage:stage,
          dueDate:d,
          dueTime:tm,
          due_date:d,
          due_time:tm,
          followupHold:future,
          scheduled_hold:future,
          remarks:'Reference follow-up scheduled after feedback',
          followReason:'Reference follow-up after feedback',
          updatedAtMs:Date.now(),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        },{merge:true}));
        try{ if(lid) writes.push(db.collection('taskMaster').doc('TASK_'+lid).set({...patch,module:'taskManagement',source:'CRM_SINGLE_LIVE',leadId:lid},{merge:true})); }catch(e){}
        await Promise.all(writes);
      }

      toast(future ? 'Reference Follow-up scheduled.' : 'Reference Follow-up due now.');
    }catch(e){
      console.error(e);
      toast('Reference follow-up failed: '+(e.message||e));
    }
  };

  // Add button after Physical Feedback stage, before Reference Follow-up.
  const oldCardRef=window.card;
  window.card=function(t){
    let html=oldCardRef(t);
    try{
      const stage=t.workflow_stage||t.stage||'New Lead';
      if(stage==='Physical Feedback'){
        const panel=`<div class="decision"><b>Feedback Decision</b><div class="actions"><button class="btn green" onclick="feedbackReceivedSetReference('${t._docId}')">Feedback Received + Set Reference Date</button><button class="btn amber" onclick="followNextStage('${t._docId}','dateTime')">Follow Up Next</button></div><div class="small">Feedback ke baad Reference Follow-up ke liye 2/3/4 din baad ka date & time yahin set hoga.</div></div>`;
        html=html.replace('<div class="actions"><button class="btn amber" onclick="startTask', panel+'<div class="actions"><button class="btn amber" onclick="startTask');
      }
    }catch(e){}
    return html;
  };
})();


/* ===== AZP HARD FIX: REFERENCE FOLLOW-UP + PHYSICAL FEEDBACK FOLLOW UP NEXT BUTTON ===== */
(function(){
  function addFollowPanelToCard(html,t){
    const stage=(t.workflow_stage||t.stage||'New Lead');
    let panel='';
    if(stage==='Physical Feedback'){
      panel=`<div class="decision"><b>Physical Feedback Follow Up</b><div class="actions"><button class="btn amber" onclick="followNextStage('${t._docId}','dateTime')">Follow Up Next</button><button class="btn green" onclick="feedbackReceivedSetReference('${t._docId}')">Feedback Done + Reference Date</button></div><div class="small">Feedback pending ho to Follow Up Next dabaiye. Feedback complete ho to Reference Date set kariye.</div></div>`;
    }
    if(stage==='Reference Follow-up'){
      panel=`<div class="decision"><b>Reference Follow Up</b><div class="actions"><button class="btn amber" onclick="followNextStage('${t._docId}','dateTime')">Follow Up Next</button></div><div class="small">Reference ke liye 2/3/4 din baad ka date & time set karke follow-up schedule kariye.</div></div>`;
    }
    if(!panel) return html;
    if(html.includes('Follow Up Next')) return html;
    if(html.includes('<div class="actions"><button class="btn amber" onclick="startTask')){
      return html.replace('<div class="actions"><button class="btn amber" onclick="startTask', panel+'<div class="actions"><button class="btn amber" onclick="startTask');
    }
    return html + panel;
  }

  const oldCardButtonFix=window.card;
  window.card=function(t){
    let html=oldCardButtonFix(t);
    return addFollowPanelToCard(html,t);
  };

  // Ensure Reference Follow-up task can be scheduled repeatedly.
  if(typeof window.followNextStage!=='function'){
    window.followNextStage=async function(id){
      toast('Follow Up Next function missing. Please refresh after upload.');
    };
  }
})();

</script></body></html>
