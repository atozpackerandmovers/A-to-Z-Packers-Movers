:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--purple:#6d28d9;--green:#059669;--red:#dc2626;--amber:#d97706;--soft:#f6f8fc}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(135deg,#0f766e,#1d4ed8 50%,#6d28d9);color:var(--ink)}button,input,select{font:inherit}button{border:0;cursor:pointer}.app{width:min(760px,100%);margin:0 auto;min-height:100vh;background:var(--soft);box-shadow:0 24px 80px rgba(2,6,23,.25);padding-bottom:50px}.hero{background:linear-gradient(135deg,#07182f,#17345f 65%,#0f766e);color:white;padding:18px}.brand{display:flex;gap:13px;align-items:center}.logo{width:54px;height:54px;border-radius:18px;background:rgba(255,255,255,.13);display:grid;place-items:center;font-size:30px}h1{font-size:22px;margin:0 0 4px;font-weight:950}.sub{margin:0;color:#cbd5e1;font-weight:650}.pill{display:inline-flex;margin-top:12px;border-radius:999px;padding:8px 12px;background:rgba(187,247,208,.18);color:#dcfce7;font-size:12px;font-weight:900}.wrap{padding:14px}.panel,.login{background:#fff;border:1px solid #edf2f7;border-radius:24px;box-shadow:0 14px 34px rgba(15,23,42,.08);padding:16px;margin-bottom:14px}.field{margin:12px 0}.field label{display:block;font-size:13px;font-weight:900;color:#334155;margin-bottom:7px}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;background:white;outline:none;font-weight:750}.btn{border-radius:16px;padding:13px 12px;font-weight:950;color:#fff;background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:0 10px 22px rgba(79,53,232,.18)}.btn.full{width:100%}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.amber{background:var(--amber)}.btn.gray{background:#f1f5f9;color:#334155;box-shadow:none}.hidden{display:none!important}.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px}.who{font-size:20px;font-weight:950}.role{color:#64748b;font-size:12px;font-weight:850}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.stat{background:white;border:1px solid #edf2f7;border-radius:18px;text-align:center;padding:12px}.stat b{display:block;font-size:23px;font-weight:950}.stat span{font-size:12px;color:#64748b;font-weight:850}.search{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;font-weight:850}.filters{display:flex;gap:8px;overflow:auto}.filter{white-space:nowrap;border:1px solid var(--line);background:white;border-radius:999px;padding:9px 12px;font-weight:900}.filter.active{background:var(--blue);color:white}.task{background:white;border:1px solid #edf2f7;border-left:6px solid var(--blue);border-radius:22px;padding:14px;margin-bottom:12px;box-shadow:0 10px 24px rgba(15,23,42,.07)}.task.hot{border-left-color:#dc2626}.task.warm{border-left-color:#d97706}.task.cold{border-left-color:#0284c7}.task.future{opacity:.8}.task h3{font-size:18px;line-height:1.3;margin:0 0 8px;font-weight:950}.meta{color:#64748b;font-size:13px;font-weight:750;line-height:1.55}.badges{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0}.badge{border-radius:999px;background:#eef2ff;color:#1e40af;padding:6px 10px;font-size:12px;font-weight:950}.badge.hot{background:#ffe4e6;color:#be123c}.badge.warm{background:#ffedd5;color:#c2410c}.badge.green{background:#dcfce7;color:#166534}.badge.gray{background:#f1f5f9;color:#334155}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.empty{padding:30px;border:1px dashed #cbd5e1;border-radius:18px;text-align:center;color:#64748b;font-weight:850;background:white}.decision{border:1px solid #fed7aa;background:#fff7ed;border-radius:18px;padding:12px;margin:10px 0}.decision b{display:block;color:#9a3412;margin-bottom:8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#0f172a;color:white;border-radius:16px;padding:12px 16px;font-weight:900;display:none;z-index:50}.toast.show{display:block}.small{font-size:12px;color:#64748b;font-weight:850}.task-guide{border:1px solid #dbeafe;background:#f8fbff;border-radius:16px;padding:10px 12px;margin:9px 0;font-size:12.5px;font-weight:850;line-height:1.45}.task-guide .en{color:#0f172a;margin-bottom:5px}.task-guide .od{color:#1d4ed8}.task-guide b{font-weight:950}

</style></head><body><div class="app"><header class="hero"><div class="brand"><div class="logo">👷</div><div><h1>A TO Z Staff App</h1><p class="sub">Compact • Advance Workflow • Bilingual Task</p></div></div><div id="fbStatus" class="pill">Connecting Firebase...</div></header><div class="wrap"><section id="loginBox" class="login"><h2>Staff Login</h2><div class="field"><label>Role</label><select id="loginRole"><option>Indoor</option><option>Outdoor</option><option>Driver</option><option>Worker</option><option>Office</option><option>Team Leader</option></select></div><div class="field"><label>Staff Name</label><input id="loginName" placeholder="Srinivas / Gayatri"></div><div class="field"><label>Mobile optional</label><input id="loginPhone" inputmode="tel"></div><button class="btn full" onclick="login()">Open My Dashboard</button></section><section id="dash" class="hidden"><div class="panel"><div class="topbar"><div><div class="who" id="who">Staff</div><div class="role" id="role">Role</div></div><button class="btn gray" onclick="logout()">Logout</button></div><div class="stats"><div class="stat"><b id="total">0</b><span>Total</span></div><div class="stat"><b id="pending">0</b><span>Pending</span></div><div class="stat"><b id="todayCnt">0</b><span>Today</span></div></div><input class="search" id="search" placeholder="Search your tasks..." oninput="render()"><div class="filters" id="filters"></div></div><div id="taskList"></div></section></div></div><div id="toast" class="toast"></div><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script>
const firebaseConfig = {
  apiKey: 'AIzaSyC4I13JSUkhun5DgpgLlnyiimTzdPobT14',
  authDomain: 'az-packers-quotation.firebaseapp.com',
  projectId: 'az-packers-quotation',
  storageBucket: 'az-packers-quotation.firebasestorage.app',
  messagingSenderId: '682004383688',
  appId: '1:682004383688:web:b795a19579dba9a612a2fd'
};
let db=null, me=null, allTasks=[], currentFilter='All'; const $=id=>document.getElementById(id); const STAGES=['New Lead','Item List','Quotation','Advance','Planning','Execution','Balance Payment','Feedback','Review'];
function norm(v){return String(v||'').trim().toLowerCase()} function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))} function today(){return new Date().toISOString().slice(0,10)} function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function init(){try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();$('fbStatus').textContent='Firebase Connected'}catch(e){$('fbStatus').textContent='Firebase Error';console.error(e)} setInterval(()=>{if(me)render()},60000); const saved=localStorage.getItem('azp_staff_login_clean'); if(saved){const s=JSON.parse(saved); $('loginName').value=s.name;$('loginRole').value=s.role;$('loginPhone').value=s.phone||''; login()}}
function login(){const name=$('loginName').value.trim(); if(!name)return toast('Name required'); me={name,role:$('loginRole').value,phone:$('loginPhone').value.replace(/\D/g,'')}; localStorage.setItem('azp_staff_login_clean',JSON.stringify(me)); $('loginBox').classList.add('hidden'); $('dash').classList.remove('hidden'); $('who').textContent=me.name; $('role').textContent=me.role+(me.phone?' • '+me.phone:''); startSync()}
function logout(){localStorage.removeItem('azp_staff_login_clean'); location.reload()}
function cleanStatus(s){s=String(s||'Pending'); if(s==='WaitingAdminApproval')return 'Waiting Admin Approval'; return s}
function matches(t){const n=norm(me.name), r=norm(me.role), p=me.phone.slice(-10); const tn=norm(t.assigned_staff||t.staffName), tr=norm(t.assign_role), tp=String(t.staff_mobile||t.phone||'').replace(/\D/g,'').slice(-10); return (tn===n)||(tn.includes(n)&&n.length>2)||(p&&tp&&p===tp)||(tr===r&&!tn)}
function docToTask(doc){const d={_docId:doc.id,...doc.data()}; if(d.module!=='taskManagement')return null; if(d.source!=='CRM_SINGLE_LIVE')return null; if(['Approved','Completed','Cancelled'].includes(cleanStatus(d.status)))return null; return d}
function startSync(){if(!db)return; db.collection('azpExecutionRecords').onSnapshot(s=>{const map=new Map(); s.forEach(doc=>{const t=docToTask(doc); if(!t||!matches(t))return; const key=t.leadId||t.id||doc.id; const old=map.get(key); if(!old||(t.updatedAtMs||0)>(old.updatedAtMs||0))map.set(key,t)}); allTasks=[...map.values()].sort((a,b)=>(b.priorityScore||0)-(a.priorityScore||0)||dueMs(a)-dueMs(b)); render()},e=>{console.error(e);toast('Firebase read issue')})}
function dueMs(t){const n=new Date((t.due_date||today())+'T'+(t.due_time||'23:59')).getTime(); return isNaN(n)?9999999999999:n} function isFuture(t){return dueMs(t)>Date.now()+60000} function isScheduledHold(t){return (t.scheduled_hold===true||t.status==='Scheduled')&&isFuture(t)} function isToday(t){return t.due_date===today()}
function nextStage(stage){const i=STAGES.indexOf(stage); return i>=0&&i<STAGES.length-1?STAGES[i+1]:stage}
function nextTaskTitle(t,stage){return `CRM TASK: ${t.customer_name||'Customer'} - ${stage} (${t.customer_priority||'Warm'})`}
function nextComment(t,stage){return `[CRM:${t.leadId}] ${stage} task for ${t.customer_name||'Customer'}. Route: ${t.from||'-'} to ${t.to||'-'}. Mobile: ${t.customer_mobile||'-'}.`}
async function updateTask(t,patch){await db.collection('azpExecutionRecords').doc(t._docId).set({...patch,updatedAtMs:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); try{await db.collection('taskMaster').doc(t.id).set(patch,{merge:true})}catch(e){}}
async function startTask(id){const t=allTasks.find(x=>x._docId===id); if(t)await updateTask(t,{status:'In Progress'}); toast('Started')}
async function completeNext(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const st=t.workflow_stage||'New Lead'; if(st==='Item List'){toast('Choose Item Received / Item Later / Cancel'); return} if(st==='Negotiation'){toast('Choose Confirm / Cancel / Follow-up Later'); return} const ns=nextStage(st); const patch={workflow_stage:ns,status:'Pending',scheduled_hold:false,task_title:nextTaskTitle(t,ns),title:nextTaskTitle(t,ns),comments:nextComment(t,ns),comment:nextComment(t,ns),due_date:today(),due_time:'11:00',priority: t.customer_priority==='Hot'?'Very Urgent':'Urgent'}; await updateTask(t,patch); await updateLead(t,{stage:ns,dueDate:today(),dueTime:'11:00'}); toast('Moved to '+ns)}
async function updateLead(t,patch){if(!t.leadId)return; await db.collection('azpExecutionRecords').doc('CRM_LEAD_'+t.leadId).set({...patch,updatedAtMs:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})}
async function itemReceived(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const ns='Quotation'; const patch={workflow_stage:ns,status:'Pending',scheduled_hold:false,task_title:nextTaskTitle(t,ns),title:nextTaskTitle(t,ns),comments:nextComment(t,ns)+' Item list received.',comment:nextComment(t,ns)+' Item list received.',due_date:today(),due_time:'11:00',priority:t.customer_priority==='Hot'?'Very Urgent':'Urgent'}; await updateTask(t,patch); await updateLead(t,{stage:ns,dueDate:today(),dueTime:'11:00',followupHold:false}); toast('Item received. Quotation task created')}
async function itemLater(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const d=prompt('Item List follow-up date YYYY-MM-DD', today()); if(!d)return; const tm=prompt('Item List follow-up time HH:MM','11:00'); if(!tm)return; const reason=prompt('Reason','Customer will send item list later')||''; const future=new Date(d+'T'+tm).getTime()>Date.now()+60000; const patch={workflow_stage:'Item List',status:future?'Scheduled':'Pending',scheduled_hold:future,task_title:nextTaskTitle(t,'Item List'),title:nextTaskTitle(t,'Item List'),comments:nextComment(t,'Item List')+' Reason: '+reason,comment:nextComment(t,'Item List')+' Reason: '+reason,due_date:d,due_time:tm,priority:future?'Scheduled':(t.customer_priority==='Hot'?'Very Urgent':'Urgent')}; await updateTask(t,patch); await updateLead(t,{stage:'Item List',dueDate:d,dueTime:tm,remarks:reason,followupHold:future,followReason:reason}); toast(future?'Item List task scheduled. Due time par show hoga.':'Item List follow-up due now')}
async function confirmTask(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; await updateTask(t,{workflow_stage:'Confirmed',status:'Pending',task_title:nextTaskTitle(t,'Confirmed'),comments:nextComment(t,'Confirmed'),due_date:today(),due_time:'11:00'}); await updateLead(t,{stage:'Confirmed',status:'Active'}); toast('Confirmed')}
async function cancelTask(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const reason=prompt('Cancel reason?')||'Cancelled by customer'; await updateTask(t,{status:'Cancelled',workflow_stage:'Cancelled',comments:'Cancelled: '+reason}); await updateLead(t,{stage:'Cancelled',status:'Cancelled',remarks:reason}); toast('Cancelled - no next task')}
async function laterTask(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; const d=prompt('Follow-up date YYYY-MM-DD', today()); if(!d)return; const tm=prompt('Follow-up time HH:MM','11:00'); if(!tm)return; const reason=prompt('Reason','Customer asked to call later')||''; const future=new Date(d+'T'+tm).getTime()>Date.now()+60000; await updateTask(t,{workflow_stage:'Follow-up',status:future?'Scheduled':'Pending',scheduled_hold:future,task_title:nextTaskTitle(t,'Follow-up'),comments:nextComment(t,'Follow-up')+' Reason: '+reason,due_date:d,due_time:tm,priority:future?'Scheduled':(t.customer_priority==='Hot'?'Very Urgent':'Urgent')}); await updateLead(t,{stage:'Follow-up',dueDate:d,dueTime:tm,remarks:reason,followupHold:future,followReason:reason}); toast(future?'Follow-up scheduled. Task due time par show hoga.':'Follow-up due now')}
function copyMsg(t){navigator.clipboard.writeText(`A TO Z Task\nCustomer: ${t.customer_name||'-'}\nMobile: ${t.customer_mobile||'-'}\nStage: ${t.workflow_stage||'-'}\nFrom-To: ${t.from||'-'} to ${t.to||'-'}\nDue: ${t.due_date||'-'} ${t.due_time||''}`); toast('Copied')}
function wa(t){let p=String(t.customer_mobile||'').replace(/\D/g,''); if(p.length===10)p='91'+p; if(!p)return toast('Customer mobile missing'); window.open(`https://wa.me/${p}`,'_blank')}
function renderFilters(){const arr=['All','Pending','In Progress','Today','Scheduled']; $('filters').innerHTML=arr.map(f=>`<button class="filter ${currentFilter===f?'active':''}" onclick="currentFilter='${f}';render()">${f}</button>`).join('')}
function filterTask(t){const st=cleanStatus(t.status); if(isScheduledHold(t)) return currentFilter==='Scheduled'; if(currentFilter==='All')return true; if(currentFilter==='Today')return isToday(t); if(currentFilter==='Scheduled')return false; return st===currentFilter}
function render(){renderFilters(); const q=norm($('search').value); const visibleBase=allTasks.filter(t=>!isScheduledHold(t)); let list=allTasks.filter(t=>filterTask(t)).filter(t=>!q||[t.task_title,t.customer_name,t.customer_mobile,t.from,t.to,t.comments].join(' ').toLowerCase().includes(q)); $('total').textContent=visibleBase.length; $('pending').textContent=visibleBase.filter(t=>cleanStatus(t.status)==='Pending').length; $('todayCnt').textContent=visibleBase.filter(isToday).length; $('taskList').innerHTML=list.length?list.map(card).join(''):'<div class="empty">No task found for your login.</div>'}
function taskGuideEnglish(stage){
 const m={
  'New Lead':'Call the customer and understand the shifting requirement clearly.',
  'Item List':'Call the customer and collect the complete household item list.',
  'Quotation':'Prepare and send the quotation after verifying the item list.',
  'Follow-up':'Contact the customer and discuss the quotation details.',
  'Negotiation':'Speak with the customer and try to finalize the booking decision.',
  'Confirmed':'Obtain the customer\'s final booking confirmation.',
  'Planning':'Finalize the vehicle, driver, workers, and work schedule.',
  'Payment':'Verify and collect the pending payment from the customer.',
  'Execution':'Monitor the shifting work from loading to delivery.',
  'Feedback':'Collect the customer\'s service feedback.',
  'Review':'Request the customer to submit a Google review.',
  'Cancelled':'This customer workflow is cancelled and no further task is required.'
 };
 return m[stage]||'Complete this customer task and update the latest status.';
}
function taskGuideOdia(stage){
 const m={
  'New Lead':'ଗ୍ରାହକଙ୍କୁ ଫୋନ କରି ଶିଫ୍ଟିଂ ଆବଶ୍ୟକତା ସ୍ପଷ୍ଟ ଭାବରେ ବୁଝନ୍ତୁ।',

  'Follow-up':'ଗ୍ରାହକଙ୍କୁ ଯୋଗାଯୋଗ କରି କୋଟେସନ୍ ବିଷୟରେ ଆଲୋଚନା କରନ୍ତୁ।',

  'Confirmed':'ଗ୍ରାହକଙ୍କ ଅନ୍ତିମ ବୁକିଂ ନିଶ୍ଚିତକରଣ ନିଅନ୍ତୁ।',
  'Planning':'ଗାଡ଼ି, ଡ୍ରାଇଭର, କର୍ମଚାରୀ ଏବଂ କାର୍ଯ୍ୟ ସମୟସୂଚୀ ଚୂଡ଼ାନ୍ତ କରନ୍ତୁ।',
  'Payment':'ଗ୍ରାହକଙ୍କ ବକେୟା ଅର୍ଥ ଯାଞ୍ଚ କରି ସଂଗ୍ରହ କରନ୍ତୁ।',
  'Execution':'ଲୋଡିଂରୁ ଡେଲିଭରି ପର୍ଯ୍ୟନ୍ତ ଶିଫ୍ଟିଂ କାମ ନିରୀକ୍ଷଣ କରନ୍ତୁ।',
  'Feedback':'ଗ୍ରାହକଙ୍କ ସେବା ସମ୍ପର୍କିତ ମତାମତ ସଂଗ୍ରହ କରନ୍ତୁ।',
  'Review':'ଗ୍ରାହକଙ୍କୁ Google Review ଦେବାକୁ ଅନୁରୋଧ କରନ୍ତୁ।',
  'Cancelled':'ଏହି ଗ୍ରାହକଙ୍କ କାର୍ଯ୍ୟ ବାତିଲ୍ ହୋଇଛି, ଆଗକୁ କୌଣସି କାମ ନାହିଁ।'
 };
 return m[stage]||'ଏହି ଗ୍ରାହକଙ୍କ କାମ ସମ୍ପୂର୍ଣ୍ଣ କରି ନୂତନ ସ୍ଥିତି ଅପଡେଟ୍ କରନ୍ତୁ।';
}
function taskGuideHTML(stage){return `<div class="task-guide"><div class="en"><b>🇬🇧 Task:</b> ${esc(taskGuideEnglish(stage))}</div><div class="od"><b>🇮🇳 କାର୍ଯ୍ୟ:</b> ${esc(taskGuideOdia(stage))}</div></div>`}
function card(t){const pr=(t.customer_priority||'Warm').toLowerCase(); const stage=t.workflow_stage||'New Lead'; let decision=''; if(stage==='Item List'){decision=`<div class="decision"><b>Item List decision</b><div class="actions"><button class="btn green" onclick="itemReceived('${t._docId}')">Item Received</button><button class="btn amber" onclick="itemLater('${t._docId}')">Item Later</button><button class="btn red" onclick="cancelTask('${t._docId}')">Cancel</button></div><div class="small">Item Later चुनने पर date/time compulsory रहेगा और task उसी समय staff app में दिखेगा.</div></div>`} else if(stage==='Negotiation'){decision=`<div class="decision"><b>Customer decision</b><div class="actions"><button class="btn green" onclick="confirmTask('${t._docId}')">Confirm</button><button class="btn amber" onclick="laterTask('${t._docId}')">Follow Later</button><button class="btn red" onclick="cancelTask('${t._docId}')">Cancel</button></div></div>`} return `<div class="task ${pr} ${isFuture(t)?'future':''}"><h3>${esc(t.customer_name||'Customer')} - ${esc(stage)}</h3>${taskGuideHTML(stage)}<div class="meta">🚚 ${esc(t.from||'-')} → ${esc(t.to||'-')}<br>📱 ${esc(t.customer_mobile||'-')}<br>📅 ${esc(t.due_date||'-')} ⏰ ${esc(t.due_time||'-')}</div><div class="badges">${isScheduledHold(t)?'<span class="badge gray">Scheduled Hidden</span>':'<span class="badge green">Single Live</span>'}<span class="badge ${pr}">${esc(t.customer_priority||'Warm')}</span><span class="badge gray">${esc(cleanStatus(t.status))}</span></div>${decision}<div class="actions"><button class="btn amber" onclick="startTask('${t._docId}')">Start</button><button class="btn green" onclick="completeNext('${t._docId}')">Complete & Next</button><button class="btn gray" onclick="copyMsg(allTasks.find(x=>x._docId==='${t._docId}'))">Copy</button><button class="btn gray" onclick="wa(allTasks.find(x=>x._docId==='${t._docId}'))">WhatsApp</button></div></div>`}


/* ===== AZP ADVANCE + SMART NEXT TASK FINAL PATCH ===== */
const AZP_STAGES_FINAL=['New Lead','Item List','Quotation','Advance','Planning','Execution','Balance Payment','Feedback','Review'];
nextStage = function(stage){ const i=AZP_STAGES_FINAL.indexOf(stage); return i>=0&&i<AZP_STAGES_FINAL.length-1?AZP_STAGES_FINAL[i+1]:stage; };
nextTaskTitle = function(t,stage){return `CRM TASK: ${t.customer_name||'Customer'} - ${stage} (${t.customer_priority||'Warm'})`};
nextComment = function(t,stage){
  const guide={
    'New Lead':'Call customer, verify shifting requirement and move to Item List stage.',
    'Item List':'Collect the complete item list from customer.',
    'Quotation':'Prepare and send quotation after item list verification.',
    'Advance':'Collect advance/token payment before planning sheet.',
    'Planning':'Prepare planning sheet after advance is received.',
    'Execution':'Monitor execution and update work status.',
    'Balance Payment':'Collect balance payment and update status.',
    'Feedback':'Collect service feedback from customer.',
    'Review':'Request Google review from customer.'
  };
  return `[CRM:${t.leadId}] ${guide[stage]||stage+' task for customer.'} Route: ${t.from||'-'} to ${t.to||'-'}. Mobile: ${t.customer_mobile||'-'}.`;
};
completeNext = async function(id){
  const t=allTasks.find(x=>x._docId===id); if(!t)return;
  const st=t.workflow_stage||'New Lead';
  if(st==='Item List'){toast('Choose Item Received / Item Later / Cancel'); return;}
  if(st==='Advance'){toast('Choose Advance Received / Advance Later / Cancel'); return;}
  const ns=nextStage(st);
  const patch={workflow_stage:ns,status:'Pending',scheduled_hold:false,task_title:nextTaskTitle(t,ns),title:nextTaskTitle(t,ns),comments:nextComment(t,ns),comment:nextComment(t,ns),due_date:today(),due_time:'11:00',priority:t.customer_priority==='Hot'?'Very Urgent':'Urgent'};
  await updateTask(t,patch); await updateLead(t,{stage:ns,dueDate:today(),dueTime:'11:00',followupHold:false}); toast('Moved to '+ns);
};
itemReceived = async function(id){
  const t=allTasks.find(x=>x._docId===id); if(!t)return; const ns='Quotation';
  const patch={workflow_stage:ns,status:'Pending',scheduled_hold:false,task_title:nextTaskTitle(t,ns),title:nextTaskTitle(t,ns),comments:nextComment(t,ns)+' Item list received.',comment:nextComment(t,ns)+' Item list received.',due_date:today(),due_time:'11:00',priority:t.customer_priority==='Hot'?'Very Urgent':'Urgent'};
  await updateTask(t,patch); await updateLead(t,{stage:ns,dueDate:today(),dueTime:'11:00',followupHold:false}); toast('Item received. Quotation task created');
};
async function scheduleSameStage(t,stage,label){
  const d=prompt(label+' date YYYY-MM-DD', today()); if(!d)return;
  const tm=prompt(label+' time HH:MM','11:00'); if(!tm)return;
  const reason=prompt('Reason', label+' later')||'';
  const future=new Date(d+'T'+tm).getTime()>Date.now()+60000;
  const patch={workflow_stage:stage,status:future?'Scheduled':'Pending',scheduled_hold:future,task_title:nextTaskTitle(t,stage),title:nextTaskTitle(t,stage),comments:nextComment(t,stage)+' Reason: '+reason,comment:nextComment(t,stage)+' Reason: '+reason,due_date:d,due_time:tm,priority:future?'Scheduled':(t.customer_priority==='Hot'?'Very Urgent':'Urgent')};
  await updateTask(t,patch); await updateLead(t,{stage:stage,dueDate:d,dueTime:tm,remarks:reason,followupHold:future,followReason:reason});
  toast(future?label+' scheduled. Staff will get next priority task now.':'Task due now');
}
itemLater = async function(id){ const t=allTasks.find(x=>x._docId===id); if(t) await scheduleSameStage(t,'Item List','Item List follow-up'); };
async function advanceReceived(id){
  const t=allTasks.find(x=>x._docId===id); if(!t)return; const ns='Planning';
  const patch={workflow_stage:ns,status:'Pending',scheduled_hold:false,task_title:nextTaskTitle(t,ns),title:nextTaskTitle(t,ns),comments:nextComment(t,ns)+' Advance received.',comment:nextComment(t,ns)+' Advance received.',due_date:today(),due_time:'11:00',priority:t.customer_priority==='Hot'?'Very Urgent':'Urgent'};
  await updateTask(t,patch); await updateLead(t,{stage:ns,dueDate:today(),dueTime:'11:00',followupHold:false}); toast('Advance received. Planning task created');
}
async function advanceLater(id){ const t=allTasks.find(x=>x._docId===id); if(t) await scheduleSameStage(t,'Advance','Advance follow-up'); }
// If customer asks later at any stage, task is scheduled and hidden until due; queue immediately shows next task.
laterTask = async function(id){ const t=allTasks.find(x=>x._docId===id); if(t) await scheduleSameStage(t,t.workflow_stage||'Follow-up',(t.workflow_stage||'Follow-up')+' follow-up'); };
confirmTask = async function(id){ if(allTasks.find(x=>x._docId===id)) await advanceReceived(id); };
taskGuideEnglish = function(stage){
 const m={
  'New Lead':'Call the customer and understand the shifting requirement clearly.',
  'Item List':'Call the customer and collect the complete household item list.',
  'Quotation':'Prepare and send the quotation after verifying the item list.',
  'Advance':'Collect advance/token payment before creating the planning sheet.',
  'Planning':'Finalize the vehicle, driver, workers, and work schedule.',
  'Execution':'Monitor the shifting work from loading to delivery.',
  'Balance Payment':'Verify and collect the remaining balance payment from the customer.',
  'Feedback':'Collect the customer service feedback.',
  'Review':'Request the customer to submit a Google review.',
  'Cancelled':'This customer workflow is cancelled and no further task is required.'
 }; return m[stage]||'Complete this customer task and update the latest status.';
};
taskGuideOdia = function(stage){
 const m={
  'New Lead':'ଗ୍ରାହକଙ୍କୁ ଫୋନ କରି ଶିଫ୍ଟିଂ ଆବଶ୍ୟକତା ସ୍ପଷ୍ଟ ଭାବରେ ବୁଝନ୍ତୁ।',
  'Item List':'ଗ୍ରାହକଙ୍କୁ ଫୋନ କରି ସମ୍ପୂର୍ଣ୍ଣ ଘରୋଇ ସାମଗ୍ରୀ ତାଲିକା ସଂଗ୍ରହ କରନ୍ତୁ।',
  'Quotation':'ସାମଗ୍ରୀ ତାଲିକା ଯାଞ୍ଚ କରି କୋଟେସନ୍ ପ୍ରସ୍ତୁତ କରି ପଠାନ୍ତୁ।',
  'Advance':'ପ୍ଲାନିଂ ସିଟ୍ ପୂର୍ବରୁ ଗ୍ରାହକଙ୍କଠାରୁ ଅଗ୍ରିମ/ଟୋକେନ୍ ପେମେଣ୍ଟ ସଂଗ୍ରହ କରନ୍ତୁ।',
  'Planning':'ଗାଡ଼ି, ଡ୍ରାଇଭର, କର୍ମଚାରୀ ଏବଂ କାର୍ଯ୍ୟ ସମୟସୂଚୀ ଚୂଡ଼ାନ୍ତ କରନ୍ତୁ।',
  'Execution':'ଲୋଡିଂରୁ ଡେଲିଭରି ପର୍ଯ୍ୟନ୍ତ ଶିଫ୍ଟିଂ କାମ ନିରୀକ୍ଷଣ କରନ୍ତୁ।',
  'Balance Payment':'ଗ୍ରାହକଙ୍କ ବାକି ଅର୍ଥ ଯାଞ୍ଚ କରି ସଂଗ୍ରହ କରନ୍ତୁ।',
  'Feedback':'ଗ୍ରାହକଙ୍କ ସେବା ସମ୍ପର୍କିତ ମତାମତ ସଂଗ୍ରହ କରନ୍ତୁ।',
  'Review':'ଗ୍ରାହକଙ୍କୁ Google Review ଦେବାକୁ ଅନୁରୋଧ କରନ୍ତୁ।',
  'Cancelled':'ଏହି ଗ୍ରାହକଙ୍କ କାର୍ଯ୍ୟ ବାତିଲ୍ ହୋଇଛି, ଆଗକୁ କୌଣସି କାମ ନାହିଁ।'
 }; return m[stage]||'ଏହି ଗ୍ରାହକଙ୍କ କାମ ସମ୍ପୂର୍ଣ୍ଣ କରି ନୂତନ ସ୍ଥିତି ଅପଡେଟ୍ କରନ୍ତୁ।';
};
card = function(t){
  const pr=(t.customer_priority||'Warm').toLowerCase(); const stage=t.workflow_stage||'New Lead'; let decision='';
  if(stage==='Item List'){
    decision=`<div class="decision"><b>Item List decision</b><div class="actions"><button class="btn green" onclick="itemReceived('${t._docId}')">Item Received</button><button class="btn amber" onclick="itemLater('${t._docId}')">Item Later</button><button class="btn red" onclick="cancelTask('${t._docId}')">Cancel</button></div><div class="small">Item Later चुनने पर date/time compulsory रहेगा और task उसी समय staff app में दिखेगा.</div></div>`;
  } else if(stage==='Advance'){
    decision=`<div class="decision"><b>Advance decision</b><div class="actions"><button class="btn green" onclick="advanceReceived('${t._docId}')">Advance Received</button><button class="btn amber" onclick="advanceLater('${t._docId}')">Advance Later</button><button class="btn red" onclick="cancelTask('${t._docId}')">Cancel</button></div><div class="small">Advance Later चुनने पर date/time compulsory रहेगा. तब तक staff को next priority task मिलेगा.</div></div>`;
  }
  return `<div class="task ${pr} ${isFuture(t)?'future':''}"><h3>${esc(t.customer_name||'Customer')} - ${esc(stage)}</h3>${taskGuideHTML(stage)}<div class="meta">🚚 ${esc(t.from||'-')} → ${esc(t.to||'-')}<br>📱 ${esc(t.customer_mobile||'-')}<br>📅 ${esc(t.due_date||'-')} ⏰ ${esc(t.due_time||'-')}</div><div class="badges">${isScheduledHold(t)?'<span class="badge gray">Scheduled Hidden</span>':'<span class="badge green">Single Live</span>'}<span class="badge ${pr}">${esc(t.customer_priority||'Warm')}</span><span class="badge gray">${esc(cleanStatus(t.status))}</span></div>${decision}<div class="actions"><button class="btn amber" onclick="startTask('${t._docId}')">Start</button><button class="btn green" onclick="completeNext('${t._docId}')">Complete & Next</button><button class="btn gray" onclick="copyMsg(allTasks.find(x=>x._docId==='${t._docId}'))">Copy</button><button class="btn gray" onclick="wa(allTasks.find(x=>x._docId==='${t._docId}'))">WhatsApp</button></div></div>`;
};

init();
</script></body></html>
