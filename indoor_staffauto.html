:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--purple:#6d28d9;--green:#059669;--red:#dc2626;--amber:#d97706;--soft:#f6f8fc}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(135deg,#0f766e,#1d4ed8 50%,#6d28d9);color:var(--ink)}button,input,select{font:inherit}button{border:0;cursor:pointer}.app{width:min(760px,100%);margin:0 auto;min-height:100vh;background:var(--soft);box-shadow:0 24px 80px rgba(2,6,23,.25);padding-bottom:50px}.hero{background:linear-gradient(135deg,#07182f,#17345f 65%,#0f766e);color:white;padding:18px}.brand{display:flex;gap:13px;align-items:center}.logo{width:54px;height:54px;border-radius:18px;background:rgba(255,255,255,.13);display:grid;place-items:center;font-size:30px}h1{font-size:22px;margin:0 0 4px;font-weight:950}.sub{margin:0;color:#cbd5e1;font-weight:650}.pill{display:inline-flex;margin-top:12px;border-radius:999px;padding:8px 12px;background:rgba(187,247,208,.18);color:#dcfce7;font-size:12px;font-weight:900}.wrap{padding:14px}.panel,.login{background:#fff;border:1px solid #edf2f7;border-radius:24px;box-shadow:0 14px 34px rgba(15,23,42,.08);padding:16px;margin-bottom:14px}.field{margin:12px 0}.field label{display:block;font-size:13px;font-weight:900;color:#334155;margin-bottom:7px}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;background:white;outline:none;font-weight:750}.btn{border-radius:16px;padding:13px 12px;font-weight:950;color:#fff;background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:0 10px 22px rgba(79,53,232,.18)}.btn.full{width:100%}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.amber{background:var(--amber)}.btn.gray{background:#f1f5f9;color:#334155;box-shadow:none}.hidden{display:none!important}.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px}.who{font-size:20px;font-weight:950}.role{color:#64748b;font-size:12px;font-weight:850}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.stat{background:white;border:1px solid #edf2f7;border-radius:18px;text-align:center;padding:12px}.stat b{display:block;font-size:23px;font-weight:950}.stat span{font-size:12px;color:#64748b;font-weight:850}.score b{color:#059669}.search{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;font-weight:850}.filters{display:flex;gap:8px;overflow:auto}.filter{white-space:nowrap;border:1px solid var(--line);background:white;border-radius:999px;padding:9px 12px;font-weight:900}.filter.active{background:var(--blue);color:white}.task{background:white;border:1px solid #edf2f7;border-left:6px solid var(--blue);border-radius:22px;padding:14px;margin-bottom:12px;box-shadow:0 10px 24px rgba(15,23,42,.07)}.task.hot,.task.urgent{border-left-color:#dc2626}.task.warm{border-left-color:#d97706}.task h3{font-size:18px;line-height:1.3;margin:0 0 8px;font-weight:950}.meta{color:#64748b;font-size:13px;font-weight:750;line-height:1.55}.badges{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0}.badge{border-radius:999px;background:#eef2ff;color:#1e40af;padding:6px 10px;font-size:12px;font-weight:950}.badge.hot,.badge.urgent{background:#ffe4e6;color:#be123c}.badge.warm{background:#ffedd5;color:#c2410c}.badge.green{background:#dcfce7;color:#166534}.badge.gray{background:#f1f5f9;color:#334155}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.empty{padding:30px;border:1px dashed #cbd5e1;border-radius:18px;text-align:center;color:#64748b;font-weight:850;background:white}.task-guide{border:1px solid #dbeafe;background:#f8fbff;border-radius:16px;padding:10px 12px;margin:9px 0;font-size:12.5px;font-weight:850;line-height:1.45}.timer{border:1px solid #fecaca;background:#fff7ed;border-radius:18px;padding:12px;margin:12px 0;font-weight:900;color:#7f1d1d}.timer b{display:block;font-size:16px;margin-bottom:4px;color:#991b1b}.time{font-size:30px;line-height:1.1;color:#059669;font-weight:950;margin:7px 0 2px}.small{font-size:12px;color:#64748b;font-weight:850}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#0f172a;color:white;border-radius:16px;padding:12px 16px;font-weight:900;display:none;z-index:50}.toast.show{display:block}.diag{display:none;margin:0 0 14px;padding:12px;border-radius:16px;border:1px solid #fecaca;background:#fff7ed;color:#7f1d1d;font-size:12px;font-weight:850;line-height:1.45;word-break:break-word}@media(max-width:520px){.actions{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}}

<div class="app">
<header class="hero"><div class="brand"><div class="logo">AZ</div><div><h1>A TO Z Staff App</h1><p class="sub">Stable Firebase Staff Dashboard</p></div></div><div id="fbStatus" class="pill">Firebase Checking...</div></header>
<div class="wrap">
<div id="diag" class="diag"></div>
<section id="loginBox" class="login"><h2>Staff Login</h2><div class="field"><label>Role</label><select id="loginRole"><option>Indoor</option><option>Outdoor</option><option>Driver</option><option>Worker</option><option>Office</option><option>Team Leader</option></select></div><div class="field"><label>Staff Name</label><input id="loginName" placeholder="Gayatri / Mahesh / Srinivas"></div><div class="field"><label>Mobile optional</label><input id="loginPhone" inputmode="tel"></div><button class="btn full" type="button" onclick="login()">Open My Dashboard</button></section>
<section id="dash" class="hidden"><div class="panel"><div class="topbar"><div><div class="who" id="who">-</div><div class="role" id="role">-</div></div><button class="btn gray" type="button" onclick="logout()">Logout</button></div><div class="stats"><div class="stat"><b id="total">0</b><span>Total</span></div><div class="stat"><b id="pending">0</b><span>Pending</span></div><div class="stat"><b id="todayCnt">0</b><span>Today</span></div><div class="stat score"><b id="todayScore">100</b><span>Today Score</span></div><div class="stat score"><b id="totalScore">100</b><span>Total Score</span></div><div class="stat score"><b id="prevDays">0</b><span>Previous Days</span></div></div><input class="search" id="search" placeholder="Search your tasks..." oninput="render()"><div class="filters" id="filters"></div></div><div id="taskList"><div class="empty">No task found for your login.</div></div></section>
</div></div><div id="toast" class="toast"></div>
<script>
const firebaseConfig={apiKey:'AIzaSyC4I13JSUkhun5DgpgLlnyiimTzdPobT14',authDomain:'az-packers-quotation.firebaseapp.com',projectId:'az-packers-quotation',storageBucket:'az-packers-quotation.firebasestorage.app',messagingSenderId:'682004383688',appId:'1:682004383688:web:b795a19579dba9a612a2fd'};
let db=null,me=null,allTasks=[],currentFilter='All',unsubscribe=null,activeTimerId='';
const SESSION_KEY='azp_staff_login_clean';const SESSION_MS=12*60*60*1000;const $=id=>document.getElementById(id);
function s(v){return String(v??'').trim()}function low(v){return s(v).toLowerCase()}function esc(v){return s(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function phone(v){let p=s(v).replace(/\D/g,'');return p.length>10?p.slice(-10):p}
function cleanName(v){return low(v).replace(/['"`.]/g,' ').replace(/\b(mr|mrs|ms|miss|sir|mam|maam|madam|ji|driver|worker|indoor|outdoor|office|team|leader|staff)\b/g,' ').replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim()}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function setFb(text,ok){$('fbStatus').textContent=text;$('fbStatus').style.background=ok?'rgba(187,247,208,.22)':'rgba(254,226,226,.22)';$('fbStatus').style.color=ok?'#dcfce7':'#fff7ed'}
function showDiag(msg){const d=$('diag');d.style.display='block';d.innerHTML='<b>Firebase / Staff Diagnostic</b><br>Host: '+esc(location.hostname||'local-file')+'<br>Error: '+esc(msg||'Unknown')+'<br><span>Local works but hosted fails usually means Google Cloud API key website restriction or Firestore rules issue.</span>'}
async function initFirebase(){try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);db=firebase.firestore();try{db.settings({experimentalForceLongPolling:true,useFetchStreams:false,ignoreUndefinedProperties:true})}catch(e){}await db.collection('azpExecutionRecords').limit(1).get();setFb('Firebase Connected',true);$('diag').style.display='none';return true}catch(e){console.error(e);setFb('Firebase Not Connected',false);showDiag(e.message||String(e));return false}}
function showLogin(){if(unsubscribe){try{unsubscribe()}catch(e){}unsubscribe=null}me=null;allTasks=[];activeTimerId='';$('dash').classList.add('hidden');$('loginBox').classList.remove('hidden');$('who').textContent='-';$('role').textContent='-';render()}
function showDash(){ $('loginBox').classList.add('hidden');$('dash').classList.remove('hidden');$('who').textContent=me.name;$('role').textContent=me.role+(me.phone?' - '+me.phone:'')}
async function login(){const name=s($('loginName').value);if(!name)return toast('Name required');me={name,role:s($('loginRole').value),phone:phone($('loginPhone').value),loginAt:Date.now()};localStorage.setItem(SESSION_KEY,JSON.stringify(me));showDash();if(!db)await initFirebase();startSync();toast('Login opened')}
function logout(){try{if(unsubscribe)unsubscribe();}catch(e){}unsubscribe=null;['azp_active_task_','azp_timer_global_','azp_staff_firebase_last_error','azp_staff_firebase_start_error'].forEach(k=>{try{Object.keys(localStorage).filter(x=>x.startsWith(k)).forEach(x=>localStorage.removeItem(x))}catch(e){}});localStorage.removeItem(SESSION_KEY);sessionStorage.clear();showLogin();history.replaceState(null,'',location.href.split('#')[0]);toast('Logged out. Please login again.')}
function restoreLogin(){try{const raw=localStorage.getItem(SESSION_KEY);if(!raw)return;const saved=JSON.parse(raw);if(!saved||!saved.name)return;if(saved.loginAt&&Date.now()-saved.loginAt>SESSION_MS){localStorage.removeItem(SESSION_KEY);return}$('loginName').value=saved.name;$('loginRole').value=saved.role||'Indoor';$('loginPhone').value=saved.phone||'';me={name:saved.name,role:saved.role||'Indoor',phone:saved.phone||'',loginAt:saved.loginAt||Date.now()};showDash();startSync()}catch(e){localStorage.removeItem(SESSION_KEY)}}
function fieldNames(t){return [t.assigned_staff,t.staffName,t.assignedStaff,t.assignedTo,t.assignTo,t.targetStaffName,t.staff_name,t.assignee,t.employeeName,t.staff,t.doneBy,t.executive,t.owner,t.staffMember,t.assignedName,t.assigned_name].map(cleanName).filter(Boolean)}
function fieldPhones(t){return [t.staff_mobile,t.staffPhone,t.targetStaffPhone,t.assignedPhone,t.assigned_phone,t.staff_phone,t.phone,t.mobile,t.taskPhone].map(phone).filter(Boolean)}
function matches(t){if(!me)return false;const myName=cleanName(me.name),myPhone=phone(me.phone),myRole=cleanName(me.role);if(myPhone&&fieldPhones(t).some(p=>p===myPhone))return true;const names=fieldNames(t);if(myName&&names.some(n=>n==='all'||n===myName||(myName.length>2&&n.includes(myName))||(n.length>2&&myName.includes(n))))return true;const taskRole=cleanName(t.assign_role||t.staffRole||t.role||t.staff_role||'');return !!(myRole&&taskRole&&myRole===taskRole&&names.length===0)}
function cleanStatus(v){const x=s(v)||'Pending';return x==='WaitingAdminApproval'?'Waiting Admin Approval':x}function isClosed(t){return /^(approved|completed|cancelled|canceled|deleted|archive|archived)$/i.test(cleanStatus(t.status||t.taskStatus||t.task_status))}
function normalizeTask(d,id){if(!d||typeof d!=='object')return null;if(s(d.module)==='staffControl'||s(d.module)==='staffMaster'||s(d.module)==='crmLead')return null;if(/^AZP_STAFF_CONTROL_|^CRM_LEAD_|^AZP_ADMIN_COMMAND_/i.test(id))return null;const looksTask=s(d.module)==='taskManagement'||s(d.collection)==='taskManagement'||d.staffAppVisible===true||d.showInStaffApp===true||d.visibleToStaff===true||!!((d.task_title||d.title||d.task||d.name)&&(fieldNames(d).length||fieldPhones(d).length||d.assign_role||d.staffRole));if(!looksTask)return null;const t={_docId:id,...d};if(isClosed(t))return null;t.module='taskManagement';t.id=s(t.id||t.task_id||id);t.leadId=s(t.leadId||t.lead_id||t.crmLeadId||'');t.task_title=s(t.task_title||t.title||t.taskTitle||t.task||t.name||'Staff Task');t.title=t.task_title;t.customer_name=s(t.customer_name||t.customerName||t.writeTo||t.write_to||t.partyName||t.name||'Customer');t.customer_mobile=s(t.customer_mobile||t.customerMobile||t.contact||t.mobile||'');t.assigned_staff=s(t.assigned_staff||t.staffName||t.assignedStaff||t.assignedTo||t.assignTo||t.targetStaffName||t.staff_name||'');t.staffName=s(t.staffName||t.assigned_staff);t.workflow_stage=s(t.workflow_stage||t.stage||t.task_stage||'New Lead');t.stage=t.workflow_stage;t.customer_priority=s(t.customer_priority||t.priorityName||t.priority||'Warm');t.status=s(t.status||t.taskStatus||t.task_status||'Pending');t.due_date=normDate(t.due_date||t.dueDate||t.date||t.task_date||t.workDate)||today();t.due_time=normTime(t.due_time||t.dueTime||t.time||t.task_time||t.workTime)||'11:00';t.comments=s(t.comments||t.comment||t.notes||'');t.updatedAtMs=Number(t.updatedAtMs||t.savedAtMs||t.createdAtMs||extractMs(t.id)||extractMs(id)||Date.now());return t}
function extractMs(v){const m=s(v).match(/(\d{11,})/);return m?Number(m[1]):0}function normDate(v){v=s(v);let m=v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');m=v.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);if(m){let y=Number(m[3]);if(y<100)y+=2000;return y+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0')}return ''}function normTime(v){v=low(v);let m=v.match(/^(\d{1,2}):(\d{2})\s*(am|pm)?$/);if(m){let h=+m[1],mi=+m[2];if(m[3]==='pm'&&h<12)h+=12;if(m[3]==='am'&&h===12)h=0;if(h>=0&&h<24&&mi>=0&&mi<60)return String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')}m=v.match(/^(\d{1,2})\s*(am|pm)$/);if(m){let h=+m[1];if(m[2]==='pm'&&h<12)h+=12;if(m[2]==='am'&&h===12)h=0;return String(h).padStart(2,'0')+':00'}return '11:00'}
function dtMs(t){const ms=new Date(t.due_date+'T'+t.due_time+':00').getTime();return isNaN(ms)?0:ms}function isToday(t){return t.due_date===today()}function isScheduledHold(t){return (t.scheduled_hold===true||t.status==='Scheduled')&&dtMs(t)>Date.now()+60000}
function taskKey(t){return s(t.leadId||t.id||t._docId)}function sortTasks(a,b){const bm=dtMs(b),am=dtMs(a);if(bm!==am)return bm-am;return Number(b.updatedAtMs||0)-Number(a.updatedAtMs||0)}
function startSync(){if(!db||!me)return;if(unsubscribe){try{unsubscribe()}catch(e){}}setFb('Firebase Syncing...',true);unsubscribe=db.collection('azpExecutionRecords').onSnapshot(snap=>{const map=new Map();snap.forEach(doc=>{const t=normalizeTask(doc.data(),doc.id);if(!t||!matches(t))return;const key=taskKey(t);const old=map.get(key);if(!old||Number(t.updatedAtMs)>=Number(old.updatedAtMs))map.set(key,t)});allTasks=[...map.values()].sort(sortTasks);setFb('Firebase Connected',true);render()},err=>{console.error(err);setFb('Firebase Read Blocked',false);showDiag(err.message||String(err));toast('Firebase task sync issue')})}
function renderFilters(){const arr=['All','Pending','In Progress','Today','Scheduled'];$('filters').innerHTML=arr.map(f=>`<button class="filter ${currentFilter===f?'active':''}" type="button" onclick="currentFilter='${f}';render()">${f}</button>`).join('')}
function filterTask(t){const st=cleanStatus(t.status);if(isScheduledHold(t))return currentFilter==='Scheduled';if(currentFilter==='All')return true;if(currentFilter==='Today')return isToday(t);if(currentFilter==='Scheduled')return false;return st===currentFilter}
function guide(stage){const m={'New Lead':'Call the customer and understand the shifting requirement clearly.','Item List':'Call the customer and collect the complete household item list.','Quotation':'Prepare and send the quotation after checking the item list.','Advance':'Collect the advance or token payment before planning.','Planning':'Finalize vehicle, driver, workers and work schedule.','Execution':'Monitor the shifting work from loading to delivery.','Feedback':'Collect customer feedback.','Review':'Request customer online review.'};return m[stage]||'Complete this task and update the latest status.'}
function activeKeyName(){return 'azp_active_task_key_'+cleanName(me?.name||'staff')}
function scoreKey(type){return 'azp_score_'+type+'_'+cleanName(me?.name||'staff')+'_'+(type==='today'?today():'total')}
function getScore(type){let v=Number(localStorage.getItem(scoreKey(type)));if(!Number.isFinite(v)||v<=0)v=100;return Math.max(0,Math.min(100,v))}
function changeScore(points){['today','total'].forEach(type=>{const v=Math.max(0,getScore(type)+points);localStorage.setItem(scoreKey(type),String(v))})}
function visibleTaskList(){const q=low($('search')?.value||'');return allTasks.filter(filterTask).filter(t=>!q||[t.task_title,t.customer_name,t.customer_mobile,t.from,t.to,t.comments].join(' ').toLowerCase().includes(q))}
function ensureActiveTask(list){list=(list||[]).filter(t=>!isScheduledHold(t));let key=localStorage.getItem(activeKeyName())||'';if(!key||!list.some(t=>taskKey(t)===key)){key=list[0]?taskKey(list[0]):'';if(key)localStorage.setItem(activeKeyName(),key)}activeTimerId=key;return key}
function timerHTML(t,i){const key=taskKey(t);const isActive=key===activeTimerId;if(!isActive||isScheduledHold(t))return `<div class="timer"><b>Waiting Timer</b><div class="small">Next Task dabane par yeh task active hoga.</div><div class="time">--:--</div></div>`;const end=timerEnd(t);return `<div class="timer"><b>Active Timer</b><div class="small">Fresh 10 minutes running</div><div class="time" data-timer="${esc(key)}">${mmss(end)}</div><button class="btn gray" type="button" onclick="resetTimer('${esc(t._docId)}')">Reset</button><button class="btn" type="button" onclick="nextTask('${esc(t._docId)}')">Next Task</button></div>`}
function timerKey(t){return 'azp_timer_'+cleanName(me?.name)+'_'+taskKey(t)}function timerEnd(t){let end=Number(localStorage.getItem(timerKey(t))||0);if(!end||end<Date.now()){end=Date.now()+10*60*1000;localStorage.setItem(timerKey(t),String(end))}return end}function mmss(end){const ms=Math.max(0,end-Date.now());return String(Math.floor(ms/60000)).padStart(2,'0')+':'+String(Math.floor((ms%60000)/1000)).padStart(2,'0')}
function card(t,i){const pr=low(t.customer_priority)||'warm',stage=t.workflow_stage||'New Lead';let decision='';if(stage==='Item List')decision=`<div class="actions"><button class="btn green" onclick="itemReceived('${esc(t._docId)}')">Item Received</button><button class="btn amber" onclick="itemLater('${esc(t._docId)}')">Item Later</button></div>`;if(stage==='Advance')decision=`<div class="actions"><button class="btn green" onclick="advanceReceived('${esc(t._docId)}')">Advance Received</button><button class="btn amber" onclick="advanceLater('${esc(t._docId)}')">Advance Later</button></div>`;return `<div class="task ${esc(pr)}"><h3>${esc(t.customer_name)} - ${esc(stage)}</h3><div class="task-guide"><b>Task:</b> ${esc(guide(stage))}</div>${timerHTML(t,i)}<div class="meta"><b>Route:</b> ${esc(t.from||'-')} to ${esc(t.to||'-')}<br><b>Mobile:</b> ${esc(t.customer_mobile||'-')}<br><b>Due:</b> ${esc(t.due_date)} ${esc(t.due_time)}</div><div class="badges"><span class="badge green">Single Live</span><span class="badge ${esc(pr)}">${esc(t.customer_priority)}</span><span class="badge gray">${esc(cleanStatus(t.status))}</span></div>${decision}<div class="actions"><button class="btn amber" onclick="startTask('${esc(t._docId)}')">Start</button><button class="btn green" onclick="completeNext('${esc(t._docId)}')">Complete & Next</button><button class="btn gray" onclick="copyMsg('${esc(t._docId)}')">Copy</button><button class="btn gray" onclick="wa('${esc(t._docId)}')">WhatsApp</button></div></div>`}
function render(){renderFilters();const base=allTasks.filter(t=>!isScheduledHold(t));const list=visibleTaskList();ensureActiveTask(list);$('total').textContent=base.length;$('pending').textContent=base.filter(t=>cleanStatus(t.status)==='Pending').length;$('todayCnt').textContent=base.filter(isToday).length;$('todayScore').textContent=getScore('today');$('totalScore').textContent=getScore('total');$('prevDays').textContent=[...new Set(base.filter(t=>!isToday(t)).map(t=>t.due_date).filter(Boolean))].length;$('taskList').innerHTML=list.length?list.map(card).join(''):'<div class="empty">No task found for your login.</div>'}
function findTask(id){return allTasks.find(t=>t._docId===id||t.id===id||taskKey(t)===id)}async function updateTask(t,patch){if(!db||!t)return;Object.assign(t,patch,{updatedAtMs:Date.now()});render();await db.collection('azpExecutionRecords').doc(t._docId).set({...patch,updatedAtMs:Date.now(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})}

      n.id='AZP_TIMER_DISABLED_STAFF_NOTICE';
      n.textContent='🔒 Timer temporarily disabled/locked by Admin. Your task list and task actions will continue normally.';
      var list=document.getElementById('taskList');
      if(list && list.parentNode) list.parentNode.insertBefore(n,list);
      else dash.insertBefore(n,dash.firstChild);
    }
  }
  window.toast=function(m){try{console.log('AZP notice suppressed:',m);}catch(e){}};
  window.timerHTML=function(){return '';};
  window.mmss=function(){return 'LOCKED';};
  window.timerEnd=function(){return 0;};
  window.resetTimer=function(){clearTimerStorage();removeTimers();return false;};
  var oldNext=window.nextTask;
  window.nextTask=function(){clearTimerStorage();removeTimers(); try{return oldNext&&oldNext.apply(this,arguments);}catch(e){return false;}};
  var oldRender=window.render;
  window.render=function(){var r; try{r=oldRender&&oldRender.apply(this,arguments);}catch(e){} setTimeout(removeTimers,0); setTimeout(removeTimers,80); return r;};
  window.addEventListener('load',function(){clearTimerStorage();setTimeout(removeTimers,100);setTimeout(removeTimers,800);});
  document.addEventListener('DOMContentLoaded',function(){clearTimerStorage();setTimeout(removeTimers,100);});
  setInterval(removeTimers,500);
  clearTimerStorage();
  removeTimers();
})();
</script>

</body>
</html>
