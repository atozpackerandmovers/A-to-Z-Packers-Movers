window.dataLayer = window.dataLayer || [];

gtag('js', new Date());

<body>

<h2>Car Transport Enquiry</h2>

<form id="leadForm">
<input type="text" id="fname" placeholder="Name" required><br><br>
<input type="tel" id="fphone" placeholder="Phone" required><br><br>
<input type="text" id="fpickup" placeholder="Pickup Location" required><br><br>
<input type="text" id="fdrop" placeholder="Drop Location" required><br><br>
<button type="submit">Submit</button>
</form>

<script>
document.getElementById('leadForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const phone = document.getElementById('fphone').value;

  const data = {
    name: document.getElementById('fname').value,
    phone: phone,
    pickup: document.getElementById('fpickup').value,
    drop: document.getElementById('fdrop').value
  };

  const response = await fetch('https://formspree.io/f/xgkgbvbg', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  if(response.ok){
    window.location.href = "thank-you.html";
  } else {
    alert("Error submitting form");
  }
});
</script>

</body>
</html>
