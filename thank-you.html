<script>
(function() {
  function pushEvent(name, payload) {
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push(Object.assign({ event: name }, payload || {}));
  }

  document.addEventListener('DOMContentLoaded', function() {
    pushEvent('lead_form_success', { page_location: window.location.href });
    if (typeof gtag === 'function') {
      gtag('event', 'generate_lead', {
        currency: 'INR',
        value: 1,
        page_location: window.location.href,
        page_title: document.title
      });
    }

    document.querySelectorAll('a[href^="tel:"]').forEach((link) => {
      link.addEventListener('click', function() {
        const phoneNumber = (link.getAttribute('href') || '').replace('tel:', '');
        pushEvent('phone_click', { phone_number: phoneNumber, page_location: window.location.href });
        if (typeof gtag === 'function') {
          gtag('event', 'contact', { method: 'phone', phone_number: phoneNumber });
        }
      }, { passive: true });
    });

    document.querySelectorAll('a[href*="wa.me"], a[href*="whatsapp.com"]').forEach((link) => {
      link.addEventListener('click', function() {
        const href = link.getAttribute('href') || '';
        pushEvent('whatsapp_click', { link_url: href, page_location: window.location.href });
        if (typeof gtag === 'function') {
          gtag('event', 'contact', { method: 'whatsapp', link_url: href });
        }
      }, { passive: true });
    });
  });
})();
</script>
