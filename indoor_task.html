<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>A TO Z Staff Task App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--purple:#6d28d9;--green:#059669;--red:#dc2626;--amber:#d97706;--soft:#f6f8fc;--card:#fff}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(135deg,#0f766e,#1d4ed8 50%,#6d28d9);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}.app{width:min(760px,100%);margin:0 auto;min-height:100vh;background:var(--soft);box-shadow:0 24px 80px rgba(2,6,23,.25);padding-bottom:90px}.hero{background:linear-gradient(135deg,#07182f,#17345f 65%,#0f766e);color:#fff;padding:20px 18px 18px;border-bottom:1px solid rgba(255,255,255,.1)}.brand{display:flex;align-items:center;gap:14px}.logo{width:56px;height:56px;border-radius:18px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-size:30px;border:1px solid rgba(255,255,255,.16)}h1{font-size:22px;margin:0 0 4px;font-weight:950;letter-spacing:-.5px}.sub{margin:0;color:#cbd5e1;font-weight:600}.pill{display:inline-flex;margin-top:13px;border-radius:999px;padding:8px 12px;background:rgba(187,247,208,.18);color:#dcfce7;font-size:12px;font-weight:900}.wrap{padding:16px}.login,.card,.panel{background:#fff;border:1px solid #edf2f7;border-radius:24px;box-shadow:0 14px 34px rgba(15,23,42,.08);padding:18px;margin-bottom:14px}.login h2,.panel h2{margin:0 0 12px;font-size:24px;font-weight:950}.field{margin:12px 0}.field label{display:block;font-size:13px;font-weight:900;margin-bottom:7px;color:#334155}.field input,.field select,.field textarea{width:100%;height:54px;border:1px solid var(--line);border-radius:16px;padding:0 14px;background:#fff;outline:none;font-size:16px;font-weight:700}.field textarea{height:92px;padding:12px 14px}.btn{border-radius:16px;padding:14px 16px;font-weight:950;color:#fff;background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:0 12px 26px rgba(79,53,232,.22)}.btn.full{width:100%}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.gray{background:#f1f5f9;color:#334155;box-shadow:none}.btn.amber{background:var(--amber)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.who{font-weight:950}.role{color:var(--muted);font-size:12px;font-weight:800;margin-top:3px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.stat{background:#fff;border:1px solid #edf2f7;border-radius:18px;padding:13px;text-align:center;box-shadow:0 8px 18px rgba(15,23,42,.06)}.stat b{display:block;font-size:24px;font-weight:950}.stat span{font-size:12px;color:var(--muted);font-weight:800}.search{width:100%;height:54px;border:1px solid var(--line);border-radius:18px;padding:0 15px;font-weight:800;outline:none;margin-bottom:10px}.filters{display:flex;gap:8px;overflow:auto;padding-bottom:8px}.filter{white-space:nowrap;border-radius:999px;padding:10px 13px;background:#fff;color:#334155;border:1px solid var(--line);font-weight:900}.filter.active{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border-color:transparent}.task{background:#fff;border:1px solid #edf2f7;border-left:6px solid var(--blue);border-radius:22px;padding:16px;margin-bottom:13px;box-shadow:0 10px 24px rgba(15,23,42,.07)}.task.overdue{border-left-color:var(--red);background:linear-gradient(180deg,#fff,#fff1f2)}.task.done{border-left-color:var(--green);background:linear-gradient(180deg,#fff,#f0fdf4)}.task h3{margin:0 0 8px;font-size:18px;line-height:1.35;font-weight:950}.meta{color:var(--muted);font-size:13px;font-weight:700;line-height:1.65}.badges{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}.badge{border-radius:999px;background:#eef2ff;color:#1e40af;padding:6px 10px;font-size:12px;font-weight:950}.badge.green{background:#dcfce7;color:#166534}.badge.red{background:#ffe4e6;color:#be123c}.badge.amber{background:#ffedd5;color:#c2410c}.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:13px}.empty{text-align:center;color:var(--muted);padding:32px;background:#fff;border:1px dashed #cbd5e1;border-radius:20px;font-weight:800}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#0f172a;color:#fff;border-radius:15px;padding:12px 15px;font-weight:900;display:none;z-index:20}.toast.show{display:block}.hidden{display:none!important}@media(max-width:520px){.wrap{padding:14px}.actions{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}h1{font-size:20px}}
</style>
</head>
<body>
<div class="app">
<header class="hero"><div class="brand"><div class="logo">👷</div><div><h1>A TO Z Staff Task App</h1><p class="sub">Driver / Worker / Indoor / Outdoor Task Inbox</p></div></div><div id="fbStatus" class="pill">Connecting Firebase...</div></header>
<div class="wrap">
<section id="loginBox" class="login">
  <h2>Staff Login</h2>
  <div class="field"><label>Role</label><select id="loginRole"><option>Indoor</option><option>Outdoor</option><option>Driver</option><option>Worker</option><option>Office</option><option>Team Leader</option></select></div>
  <div class="field"><label>Staff Name</label><input id="loginName" placeholder="Example: Srinivas / Ajay / Deepak" autocomplete="name"></div>
  <div class="field"><label>Mobile Number (optional)</label><input id="loginPhone" placeholder="10 digit mobile"></div>
  <button class="btn full" id="loginBtn">Open My Task Dashboard</button>
</section>
<section id="dashBox" class="hidden">
  <div class="panel"><div class="topbar"><div><div class="who" id="whoName">Staff</div><div class="role" id="whoRole">Role</div></div><button class="btn gray" id="logoutBtn">Logout</button></div>
    <div class="stats"><div class="stat"><b id="sTotal">0</b><span>Total</span></div><div class="stat"><b id="sPending">0</b><span>Pending</span></div><div class="stat"><b id="sToday">0</b><span>Today</span></div></div>
    <input class="search" id="search" placeholder="Search any word from your tasks...">
    <div class="filters" id="filters"></div>
  </div>
  <div id="taskList"></div>
</section>
</div>
</div>
<div id="toast" class="toast"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:'AIzaSyC4I13JSUkhun5DgpgLlnyiimTzdPobT14',authDomain:'az-packers-quotation.firebaseapp.com',projectId:'az-packers-quotation',storageBucket:'az-packers-quotation.firebasestorage.app',messagingSenderId:'682004383688',appId:'1:682004383688:web:b795a19579dba9a612a2fd'};
let db=null, allTasks=[], me=null, currentFilter='All';
const $=id=>document.getElementById(id); const norm=v=>String(v||'').trim().toLowerCase();
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2300)}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function today(){return new Date().toISOString().slice(0,10)}
function isOverdue(t){const st=cleanStatus(t.status); if(['Completed','Approved','Waiting Admin Approval'].includes(st)) return false; if(!t.due_date) return false; return new Date((t.due_date||today())+'T'+(t.due_time||'23:59'))<new Date()}
function init(){try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();$('fbStatus').textContent='Firebase Connected';}catch(e){$('fbStatus').textContent='Firebase Error';toast('Firebase connection error');console.error(e)}}
function login(){const name=$('loginName').value.trim(), role=$('loginRole').value, phone=$('loginPhone').value.replace(/\D/g,''); if(!name) return toast('Staff name required'); me={name,role,phone}; localStorage.setItem('azp_staff_login',JSON.stringify(me)); $('loginBox').classList.add('hidden'); $('dashBox').classList.remove('hidden'); $('whoName').textContent=name; $('whoRole').textContent=role+(phone?' • '+phone:''); startSync();}
function logout(){localStorage.removeItem('azp_staff_login'); location.reload()}
function cleanStatus(v){v=String(v||'Pending').trim(); if(v==='InProgress')return 'In Progress'; if(v==='WaitingAdminApproval')return 'Waiting Admin Approval'; return v;}
function isApprovedTask(t){const vals=[t.status,t.admin_approval,t.staff_app_status,t.task_status].map(v=>String(v||'').trim().toLowerCase()); return vals.includes('approved') || vals.includes('completed') || vals.includes('admin approved');}
function taskKey(t){return String(t.fixed_task_doc_id||t.firebase_doc_id||t.id||t._docId||'').trim() || [t.task_title,t.assigned_staff,t.staff_mobile,t.due_date,t.createdAtMs].join('|');}
function docToTask(doc){const d=doc.data(); if((d.module||d.collection)!=='taskManagement') return null; const t={...d, _docId:doc.id, id:d.id||doc.id, firebase_doc_id:d.firebase_doc_id||doc.id, fixed_task_doc_id:d.fixed_task_doc_id||'', task_title:d.task_title||d.title||'', assigned_staff:d.assigned_staff||d.staffName||'', assign_role:d.assign_role||'', staff_mobile:d.staff_mobile||d.phone||'', due_date:d.due_date||d.dueDate||'', due_time:d.due_time||d.dueTime||'', task_type:d.task_type||d.type||'Small Task', priority:d.priority||'Normal', status:cleanStatus(d.status||d.staff_app_status||'Pending'), admin_approval:d.admin_approval||'', staff_app_status:d.staff_app_status||'', comments:d.comments||d.comment||''}; return t;}
function matchesMe(t){const n=norm(me.name), r=norm(me.role), p=(me.phone||'').slice(-10); const tn=norm(t.assigned_staff||t.staffName), tr=norm(t.assign_role), tp=String(t.staff_mobile||'').replace(/\D/g,'').slice(-10); return (tn&&tn===n) || (p&&tp&&p===tp) || (tn.includes(n)&&n.length>2) || (tr===r && !tn);}
function startSync(){if(!db)return; db.collection('azpExecutionRecords').onSnapshot(snap=>{const map=new Map(); snap.forEach(doc=>{const t=docToTask(doc); if(!t||!matchesMe(t)||isApprovedTask(t)) return; const k=taskKey(t); const old=map.get(k); if(!old || (t.updatedAtMs||t.createdAtMs||0)>(old.updatedAtMs||old.createdAtMs||0)) map.set(k,t);}); allTasks=[...map.values()].sort((a,b)=>(b.createdAtMs||0)-(a.createdAtMs||0)); render();},e=>{console.error(e);toast('Firebase read permission issue')});}
function renderFilters(){const arr=['All','Pending','In Progress','Waiting Admin Approval','Completed','Today','Overdue']; $('filters').innerHTML=arr.map(f=>`<button class="filter ${currentFilter===f?'active':''}" data-filter="${f}">${f}</button>`).join('')}
function filterTask(t){const st=cleanStatus(t.status); if(currentFilter==='All')return true;if(currentFilter==='Today')return t.due_date===today();if(currentFilter==='Overdue')return isOverdue(t);return st===currentFilter}
function matchSearch(t){const q=norm($('search').value); if(!q)return true; return q.split(/\s+/).some(w=>[t.task_title,t.assigned_staff,t.assign_role,t.status,t.priority,t.task_type,t.comments,t.due_date,t.due_time].join(' ').toLowerCase().includes(w))}
function render(){renderFilters(); const list=allTasks.filter(t=>filterTask(t)&&matchSearch(t)); $('sTotal').textContent=allTasks.length; $('sPending').textContent=allTasks.filter(t=>cleanStatus(t.status)==='Pending').length; $('sToday').textContent=allTasks.filter(t=>t.due_date===today()).length; $('taskList').innerHTML=list.length?list.map(card).join(''):'<div class="empty">No task found for your login.</div>'}
function card(t){const st=cleanStatus(t.status); const cls=st==='Completed'||st==='Approved'?'done':isOverdue(t)?'overdue':''; const statusClass=(st==='Completed'||st==='Approved')?'green':st==='Pending'?'amber':''; const actionBtns=st==='Waiting Admin Approval' ? `<button class="btn gray" data-act="copy" data-id="${t._docId}">Copy</button><button class="btn gray" data-act="wa" data-id="${t._docId}">WhatsApp</button>` : `<button class="btn amber" data-act="progress" data-id="${t._docId}">Start / In Progress</button><button class="btn green" data-act="done" data-id="${t._docId}">Completed</button><button class="btn gray" data-act="copy" data-id="${t._docId}">Copy</button><button class="btn gray" data-act="wa" data-id="${t._docId}">WhatsApp</button>`; return `<div class="task ${cls}"><h3>${esc(t.task_title)}</h3><div class="meta">📅 ${esc(t.due_date||'-')} &nbsp; ⏰ ${esc(t.due_time||'-')}<br>👤 ${esc(t.assigned_staff||'-')} &nbsp; 📱 ${esc(t.staff_mobile||'-')}<br>📝 ${esc(t.comments||'No comment')}</div><div class="badges">${isOverdue(t)?'<span class="badge red">OVERDUE</span>':''}<span class="badge">${esc(t.task_type)}</span><span class="badge ${statusClass}">${esc(st)}</span><span class="badge ${t.priority==='Very Urgent'?'red':t.priority==='Urgent'?'amber':''}">${esc(t.priority)}</span></div><div class="actions">${actionBtns}</div></div>`}
async function updateStatus(id,status){const t=allTasks.find(x=>x._docId===id); if(!t)return; const display=cleanStatus(status); const nowText=new Date().toLocaleString('en-IN'); const update={status:display, staff_app_status:display, staff_updatedAt:nowText, updatedAtMs:Date.now()}; if(display==='Waiting Admin Approval'){update.admin_approval='Waiting Admin Approval'; update.completed_request_at=nowText;} try{await db.collection('azpExecutionRecords').doc(id).set(update, {merge:true}); if(t.id){try{await db.collection('taskMaster').doc(t.id).set(update, {merge:true});}catch(e){}} toast('Status updated: '+display)}catch(e){console.error(e);toast('Status update failed')}}
function taskMsg(t){return `📦 A TO Z Packers & Movers\nTask Update\n\n👤 Staff: ${t.assigned_staff}\n📌 Task: ${t.task_title}\n📅 Due: ${t.due_date||'-'} ${t.due_time||''}\n📊 Status: ${t.status}\n📝 Comment: ${t.comments||'-'}`}
function copyTask(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; navigator.clipboard.writeText(taskMsg(t)); toast('Task copied')}
function waTask(id){const t=allTasks.find(x=>x._docId===id); if(!t)return; let phone=String(t.staff_mobile||me.phone||'').replace(/\D/g,''); if(phone.length===10)phone='91'+phone; if(!phone)return toast('Mobile number missing'); window.open(`https://wa.me/${phone}?text=${encodeURIComponent(taskMsg(t))}`,'_blank')}
document.addEventListener('click',e=>{const f=e.target.closest('[data-filter]'); if(f){currentFilter=f.dataset.filter; render(); return} const b=e.target.closest('[data-act]'); if(!b)return; const id=b.dataset.id; if(b.dataset.act==='progress')updateStatus(id,'In Progress'); if(b.dataset.act==='done')updateStatus(id,'Waiting Admin Approval'); if(b.dataset.act==='copy')copyTask(id); if(b.dataset.act==='wa')waTask(id);});
$('loginBtn').onclick=login; $('logoutBtn').onclick=logout; $('search').oninput=render; init(); const saved=localStorage.getItem('azp_staff_login'); if(saved){try{const s=JSON.parse(saved); $('loginName').value=s.name||''; $('loginRole').value=s.role||'Indoor'; $('loginPhone').value=s.phone||''; login();}catch(e){}}
</script>
</body>
</html>
